<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="منهجية Lean وتقليل الهدر وزيادة القيمة">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 46px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">منهجية Lean</text>
  <text x="800" y="156" class="sub" text-anchor="middle">تقليل الهدر وزيادة القيمة من منظور العميل</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="520" y="260" width="560" height="260" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="350" class="white" text-anchor="middle">Lean Thinking</text>
  <text x="800" y="410" class="white2" text-anchor="middle">كل نشاط يجب أن يضيف قيمة أو يُراجع</text>
  <rect x="615" y="445" width="370" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="482" class="pill" text-anchor="middle">قيمة أكثر، هدر أقل</text>

  <g filter="url(#shadow)"><rect x="90" y="320" width="360" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="378" class="h" text-anchor="middle">القيمة</text>
  <line x1="170" y1="402" x2="370" y2="402" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="450" class="p" text-anchor="middle">ما ينتظره العميل فعلًا</text>

  <g filter="url(#shadow)"><rect x="1150" y="320" width="360" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="378" class="h" text-anchor="middle">الهدر</text>
  <line x1="1230" y1="402" x2="1430" y2="402" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="450" class="p" text-anchor="middle">نشاط لا يضيف قيمة</text>

  <g filter="url(#shadow)"><rect x="90" y="620" width="360" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="678" class="h" text-anchor="middle">تحسين مستمر</text>
  <line x1="165" y1="702" x2="375" y2="702" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="750" class="p" text-anchor="middle">ملاحظة وتحليل وتجريب</text>

  <g filter="url(#shadow)"><rect x="1150" y="620" width="360" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="678" class="h" text-anchor="middle">انضباط</text>
  <line x1="1230" y1="702" x2="1430" y2="702" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="750" class="p" text-anchor="middle">فحص العمليات باستمرار</text>

  <line x1="450" y1="402" x2="520" y2="390" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1080" y1="390" x2="1150" y2="402" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="450" y1="702" x2="615" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1150" y1="702" x2="985" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="455" y="800" width="690" height="62" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="840" class="h" text-anchor="middle">العمل الكثير لا يعني قيمة أكثر إذا كان ممتلئًا بالهدر</text>
</svg>