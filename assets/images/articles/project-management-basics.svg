<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="ما هي إدارة المشاريع">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 29px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 46px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">ما هي إدارة المشاريع؟</text>
  <text x="800" y="156" class="sub" text-anchor="middle">تحويل الأفكار والخطط إلى نتائج ضمن قيود واضحة</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="540" y="260" width="520" height="260" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="690" y="320" width="220" height="135" rx="20"/>
    <path d="M730 360 h140 M730 405 h105"/>
    <path d="M660 455 l55-55 M940 455 l-55-55"/>
    <circle cx="660" cy="455" r="22"/><circle cx="940" cy="455" r="22"/>
  </g>
  <text x="800" y="590" class="white" text-anchor="middle">إدارة المشاريع</text>
  <text x="800" y="645" class="white2" text-anchor="middle">مهارات وأدوات وعمليات لتنفيذ المشروع بنجاح</text>
  <rect x="615" y="672" width="370" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="709" class="pill" text-anchor="middle">قيمة واضحة وتغيير مفيد</text>

  <g filter="url(#shadow)"><rect x="90" y="310" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="365" class="h" text-anchor="middle">وقت محدد</text>
  <line x1="170" y1="388" x2="360" y2="388" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="435" class="p" text-anchor="middle">بداية ونهاية ومواعيد</text>

  <g filter="url(#shadow)"><rect x="1160" y="310" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="365" class="h" text-anchor="middle">تكلفة وموارد</text>
  <line x1="1230" y1="388" x2="1440" y2="388" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="435" class="p" text-anchor="middle">ميزانية وفريق وأدوات</text>

  <g filter="url(#shadow)"><rect x="90" y="610" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="665" class="h" text-anchor="middle">جودة ومخرجات</text>
  <line x1="165" y1="688" x2="365" y2="688" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="735" class="p" text-anchor="middle">نتائج واضحة قابلة للتسليم</text>

  <g filter="url(#shadow)"><rect x="1160" y="610" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="665" class="h" text-anchor="middle">مخاطر وتغيير</text>
  <line x1="1230" y1="688" x2="1440" y2="688" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="735" class="p" text-anchor="middle">عدم يقين وقيمة متوقعة</text>

  <line x1="440" y1="388" x2="540" y2="388" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1060" y1="388" x2="1160" y2="388" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="440" y1="688" x2="620" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1160" y1="688" x2="980" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>