<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="انتشار الابتكار واستشراف المستقبل">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 56px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 20px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 42px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .num{font:700 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">انتشار الابتكار واستشراف المستقبل</text>
  <text x="800" y="156" class="sub" text-anchor="middle">كيف تتحول الإشارة الصغيرة إلى تغير واسع؟</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="520" y="235" width="560" height="155" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="325" class="white" text-anchor="middle">Diffusion of Innovation</text>

  <path d="M180 690 C360 660, 430 590, 570 540 C760 470, 900 465, 1070 510 C1220 550, 1330 610, 1430 660"
        fill="none" stroke="#d5a033" stroke-width="9" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="70" y="520" width="245" height="145" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="192" cy="500" r="32" fill="#0f2d5d"/><text x="192" y="509" class="num" text-anchor="middle">1</text>
  <text x="192" y="575" class="h" text-anchor="middle">المبتكرون</text>
  <text x="192" y="620" class="p" text-anchor="middle">تجريب مبكر</text>

  <g filter="url(#shadow)"><rect x="365" y="455" width="245" height="145" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="487" cy="435" r="32" fill="#0f2d5d"/><text x="487" y="444" class="num" text-anchor="middle">2</text>
  <text x="487" y="510" class="h" text-anchor="middle">المتبنون الأوائل</text>
  <text x="487" y="555" class="p" text-anchor="middle">إشارة مهمة للمستقبل</text>

  <g filter="url(#shadow)"><rect x="675" y="420" width="250" height="145" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="800" cy="400" r="32" fill="#0f2d5d"/><text x="800" y="409" class="num" text-anchor="middle">3</text>
  <text x="800" y="475" class="h" text-anchor="middle">الأغلبية المبكرة</text>
  <text x="800" y="520" class="p" text-anchor="middle">بداية الانتشار</text>

  <g filter="url(#shadow)"><rect x="985" y="455" width="245" height="145" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1107" cy="435" r="32" fill="#0f2d5d"/><text x="1107" y="444" class="num" text-anchor="middle">4</text>
  <text x="1107" y="510" class="h" text-anchor="middle">الأغلبية المتأخرة</text>
  <text x="1107" y="555" class="p" text-anchor="middle">تحول واضح</text>

  <g filter="url(#shadow)"><rect x="1285" y="520" width="245" height="145" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1407" cy="500" r="32" fill="#0f2d5d"/><text x="1407" y="509" class="num" text-anchor="middle">5</text>
  <text x="1407" y="575" class="h" text-anchor="middle">المتأخرون</text>
  <text x="1407" y="620" class="p" text-anchor="middle">بعد شيوع التغير</text>

  <g filter="url(#shadow)">
    <rect x="390" y="775" width="820" height="62" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="815" class="h" text-anchor="middle">الابتكار في بدايته قد يكون إشارة ضعيفة، لكنه قد يصبح قوة محركة</text>
</svg>