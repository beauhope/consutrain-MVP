<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="أنواع القيادة">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 45px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="95" class="title" text-anchor="middle">أنواع القيادة</text>
  <text x="800" y="155" class="sub" text-anchor="middle">لا يوجد أسلوب واحد يناسب كل فريق وكل موقف</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="540" y="255" width="520" height="225" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/></g>
  <text x="800" y="340" class="white" text-anchor="middle">أسلوب القيادة</text>
  <text x="800" y="398" class="white2" text-anchor="middle">طريقة التأثير والتوجيه واتخاذ القرار</text>

  <g filter="url(#shadow)"><rect x="90" y="540" width="260" height="170" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="220" y="600" class="h" text-anchor="middle">توجيهية</text>
  <line x1="150" y1="623" x2="290" y2="623" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="220" y="670" class="p" text-anchor="middle">قرار سريع</text>
  <text x="220" y="704" class="p" text-anchor="middle">وتعليمات واضحة</text>

  <g filter="url(#shadow)"><rect x="385" y="540" width="260" height="170" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="515" y="600" class="h" text-anchor="middle">تشاركية</text>
  <line x1="445" y1="623" x2="585" y2="623" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="515" y="670" class="p" text-anchor="middle">حوار ومشاركة</text>
  <text x="515" y="704" class="p" text-anchor="middle">في القرار</text>

  <g filter="url(#shadow)"><rect x="680" y="540" width="260" height="170" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="810" y="600" class="h" text-anchor="middle">تفويضية</text>
  <line x1="740" y1="623" x2="880" y2="623" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="810" y="670" class="p" text-anchor="middle">ثقة ومساحة</text>
  <text x="810" y="704" class="p" text-anchor="middle">للفريق الخبير</text>

  <g filter="url(#shadow)"><rect x="975" y="540" width="260" height="170" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1105" y="600" class="h" text-anchor="middle">تحويلية</text>
  <line x1="1035" y1="623" x2="1175" y2="623" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1105" y="670" class="p" text-anchor="middle">رؤية وإلهام</text>
  <text x="1105" y="704" class="p" text-anchor="middle">وتغيير</text>

  <g filter="url(#shadow)"><rect x="1270" y="540" width="240" height="170" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1390" y="600" class="h" text-anchor="middle">معاملاتية</text>
  <line x1="1320" y1="623" x2="1460" y2="623" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1390" y="670" class="p" text-anchor="middle">أهداف ومتابعة</text>
  <text x="1390" y="704" class="p" text-anchor="middle">ومكافأة</text>

  <path d="M220 520 H1390" fill="none" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="800" y1="480" x2="800" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="220" y1="520" x2="220" y2="540" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="515" y1="520" x2="515" y2="540" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="810" y1="520" x2="810" y2="540" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1105" y1="520" x2="1105" y2="540" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1390" y1="520" x2="1390" y2="540" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="505" y="765" width="590" height="82" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="800" y="818" style="font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d" text-anchor="middle">القائد الفعال يختار الأسلوب حسب الموقف والفريق</text>
</svg>