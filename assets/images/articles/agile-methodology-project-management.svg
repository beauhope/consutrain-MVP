<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="منهجية Agile في إدارة المشاريع">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 48px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">منهجية Agile</text>
  <text x="800" y="156" class="sub" text-anchor="middle">نمط تفكير مرن يقوم على التكيف والتسليم التدريجي</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="540" y="255" width="520" height="260" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="345" class="white" text-anchor="middle">Agile Mindset</text>
  <text x="800" y="405" class="white2" text-anchor="middle">قِيم ومبادئ قبل أن تكون أدوات</text>
  <rect x="615" y="440" width="370" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="477" class="pill" text-anchor="middle">تعلّم • تكيّف • قيمة</text>

  <g filter="url(#shadow)"><rect x="90" y="300" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="355" class="h" text-anchor="middle">الأفراد والتفاعل</text>
  <line x1="170" y1="378" x2="370" y2="378" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="425" class="p" text-anchor="middle">أهم من الأدوات وحدها</text>

  <g filter="url(#shadow)"><rect x="1150" y="300" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="355" class="h" text-anchor="middle">تسليم تدريجي</text>
  <line x1="1230" y1="378" x2="1430" y2="378" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="425" class="p" text-anchor="middle">أجزاء صغيرة قابلة للاستخدام</text>

  <g filter="url(#shadow)"><rect x="90" y="610" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="665" class="h" text-anchor="middle">تعاون العميل</text>
  <line x1="170" y1="688" x2="370" y2="688" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="735" class="p" text-anchor="middle">مشاركة مستمرة في التطوير</text>

  <g filter="url(#shadow)"><rect x="1150" y="610" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="665" class="h" text-anchor="middle">الاستجابة للتغيير</text>
  <line x1="1230" y1="688" x2="1430" y2="688" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="735" class="p" text-anchor="middle">تعديل وتعلم أثناء الطريق</text>

  <path d="M645 640 C560 570 560 450 650 390" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M955 390 C1040 460 1040 580 950 640" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M650 390 l-45 5 l25-38" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M950 640 l45-5 l-25 38" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="485" y="785" width="630" height="70" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="831" class="h" text-anchor="middle">مناسبة عندما تكون المتطلبات قابلة للتغير والتعلم المستمر مطلوبًا</text>
</svg>