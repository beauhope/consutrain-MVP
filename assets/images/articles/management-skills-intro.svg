<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">المهارات الإدارية الأساسية</title>
  <desc id="desc">رسم تعليمي منظم يوضح علاقة الإدارة بالمهارات التقنية والإنسانية والفكرية.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef6ff"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff7e3"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d2442"/>
      <stop offset="1" stop-color="#1f6f9f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7d77b"/>
      <stop offset="1" stop-color="#d6a73c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0d2442" flood-opacity="0.14"/>
    </filter>
    <style>
      .font{font-family: Tahoma, Arial, sans-serif; direction:rtl; unicode-bidi:bidi-override;}
      .title{font-size:40px;font-weight:800;fill:#0d2442;}
      .subtitle{font-size:21px;fill:#5a6878;}
      .card-title{font-size:24px;font-weight:800;fill:#0d2442;}
      .card-text{font-size:16px;fill:#5a6878;}
      .small{font-size:15px;fill:#5a6878;}
    </style>
  </defs>

  <rect width="1200" height="680" rx="36" fill="url(#bg)"/>
  <circle cx="1080" cy="105" r="120" fill="#d6a73c" opacity="0.12"/>
  <circle cx="115" cy="575" r="155" fill="#1f6f9f" opacity="0.09"/>
  <circle cx="260" cy="115" r="48" fill="#1f6f9f" opacity="0.06"/>
  <circle cx="940" cy="580" r="54" fill="#d6a73c" opacity="0.08"/>

  <text class="font title" x="600" y="82" text-anchor="middle">المهارات الإدارية الأساسية</text>
  <text class="font subtitle" x="600" y="122" text-anchor="middle">من المعرفة إلى التنفيذ العملي</text>
  <line x1="475" y1="145" x2="545" y2="145" stroke="#d6a73c" stroke-width="5" stroke-linecap="round"/>
  <line x1="655" y1="145" x2="725" y2="145" stroke="#d6a73c" stroke-width="5" stroke-linecap="round"/>

  <!-- connectors behind cards -->
  <g stroke="#d6a73c" stroke-width="5" stroke-linecap="round" opacity="0.75" fill="none">
    <path d="M420 325 H380"/>
    <path d="M780 325 H820"/>
    <path d="M600 410 V465"/>
    <circle cx="420" cy="325" r="6" fill="#d6a73c" stroke="none"/>
    <circle cx="780" cy="325" r="6" fill="#d6a73c" stroke="none"/>
    <circle cx="600" cy="410" r="6" fill="#d6a73c" stroke="none"/>
  </g>

  <!-- center -->
  <g filter="url(#shadow)">
    <rect x="420" y="210" width="360" height="200" rx="30" fill="url(#navy)"/>
    <circle cx="600" cy="258" r="28" fill="#ffffff" opacity="0.11"/>
    <path d="M588 256a12 12 0 1 0 24 0a12 12 0 1 0-24 0M570 298c10-22 50-22 60 0M545 300c7-16 33-16 40 0M615 300c7-16 33-16 40 0" fill="none" stroke="#f7d77b" stroke-width="5" stroke-linecap="round"/>
    <text class="font" x="600" y="315" text-anchor="middle" font-size="32" font-weight="800" fill="#ffffff">الإدارة</text>
    <text class="font" x="600" y="352" text-anchor="middle" font-size="19" fill="#e3f2ff">تخطيط • تنظيم • قيادة • رقابة</text>
    <rect x="500" y="370" width="200" height="42" rx="21" fill="url(#gold)"/>
    <text class="font" x="600" y="397" text-anchor="middle" font-size="16" font-weight="800" fill="#0d2442">نتائج قابلة للقياس</text>
  </g>

  <!-- left card -->
  <g filter="url(#shadow)">
    <rect x="90" y="245" width="290" height="165" rx="28" fill="#ffffff"/>
    <circle cx="320" cy="292" r="34" fill="#e7f3ff"/>
    <path d="M307 295h26M312 304h16M314 281h22M304 278l7-7M337 278l-7-7" fill="none" stroke="#1f6f9f" stroke-width="4" stroke-linecap="round"/>
    <text class="font card-title" x="235" y="292" text-anchor="middle">مهارات تقنية</text>
    <line x1="180" y1="312" x2="290" y2="312" stroke="#1f6f9f" stroke-width="4" stroke-linecap="round" opacity="0.65"/>
    <text class="font card-text" x="235" y="345" text-anchor="middle">أدوات، أنظمة، بيانات،</text>
    <text class="font card-text" x="235" y="371" text-anchor="middle">تقارير وتنفيذ متخصص</text>
  </g>

  <!-- right card -->
  <g filter="url(#shadow)">
    <rect x="820" y="245" width="290" height="165" rx="28" fill="#ffffff"/>
    <circle cx="1050" cy="292" r="34" fill="#fff2d2"/>
    <path d="M1034 292c9-9 20-9 28 0M1034 292l-10 10M1062 292l10 10M1034 280a8 8 0 1 0 16 0M1054 280a8 8 0 1 0 16 0" fill="none" stroke="#d6a73c" stroke-width="4" stroke-linecap="round"/>
    <text class="font card-title" x="965" y="292" text-anchor="middle">مهارات إنسانية</text>
    <line x1="910" y1="312" x2="1020" y2="312" stroke="#d6a73c" stroke-width="4" stroke-linecap="round" opacity="0.75"/>
    <text class="font card-text" x="965" y="345" text-anchor="middle">تواصل، تحفيز، تعاون،</text>
    <text class="font card-text" x="965" y="371" text-anchor="middle">تعامل مع الخلافات</text>
  </g>

  <!-- bottom card -->
  <g filter="url(#shadow)">
    <rect x="385" y="465" width="430" height="150" rx="28" fill="#ffffff"/>
    <circle cx="745" cy="512" r="34" fill="#eaf8f0"/>
    <path d="M740 527h14M742 520h10M732 505c0-15 27-20 32-4c3 10-6 16-11 22M725 505h-10M778 505h10M734 487l-7-8M768 487l7-8" fill="none" stroke="#3e9b6f" stroke-width="4" stroke-linecap="round"/>
    <text class="font card-title" x="600" y="510" text-anchor="middle">مهارات فكرية</text>
    <line x1="535" y1="530" x2="665" y2="530" stroke="#3e9b6f" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <text class="font card-text" x="600" y="563" text-anchor="middle">فهم الصورة الكبرى، تحليل المشكلات</text>
    <text class="font card-text" x="600" y="589" text-anchor="middle">وربط القرارات بالنتائج</text>
  </g>
</svg>
