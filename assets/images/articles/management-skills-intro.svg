<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Essential Management Skills</title>
  <desc id="desc">A simple Arabic visual showing technical, interpersonal and conceptual management skills around management functions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5ff"/>
      <stop offset="0.55" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff6df"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2747"/>
      <stop offset="1" stop-color="#1f6f9f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7d77b"/>
      <stop offset="1" stop-color="#d4a63a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f2747" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="680" rx="34" fill="url(#bg)"/>
  <circle cx="1050" cy="110" r="120" fill="#d4a63a" opacity="0.14"/>
  <circle cx="120" cy="570" r="150" fill="#1f6f9f" opacity="0.10"/>

  <g transform="translate(120 92)">
    <text x="960" y="0" text-anchor="end" font-family="Tahoma, Arial, sans-serif" font-size="34" font-weight="800" fill="#0f2747">المهارات الإدارية الأساسية</text>
    <text x="960" y="46" text-anchor="end" font-family="Tahoma, Arial, sans-serif" font-size="20" fill="#526173">من المعرفة إلى التنفيذ العملي</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="420" y="190" width="360" height="210" rx="30" fill="url(#primary)"/>
    <text x="600" y="260" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff">الإدارة</text>
    <text x="600" y="306" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="18" fill="#dcefff">تخطيط • تنظيم • قيادة • رقابة</text>
    <rect x="512" y="330" width="176" height="40" rx="20" fill="url(#gold)"/>
    <text x="600" y="356" text-anchor="middle" font-family="Tahoma, Arial, sans-serif" font-size="16" font-weight="700" fill="#0f2747">نتائج قابلة للقياس</text>
  </g>

  <g font-family="Tahoma, Arial, sans-serif" filter="url(#shadow)">
    <rect x="112" y="210" width="250" height="150" rx="28" fill="#ffffff"/>
    <circle cx="310" cy="252" r="34" fill="#e9f3ff"/>
    <text x="250" y="258" text-anchor="end" font-size="21" font-weight="800" fill="#0f2747">مهارات تقنية</text>
    <text x="320" y="306" text-anchor="end" font-size="15" fill="#526173">أدوات، أنظمة، بيانات،</text>
    <text x="320" y="330" text-anchor="end" font-size="15" fill="#526173">تقارير وتنفيذ متخصص</text>

    <rect x="838" y="210" width="250" height="150" rx="28" fill="#ffffff"/>
    <circle cx="1036" cy="252" r="34" fill="#fff4d8"/>
    <text x="974" y="258" text-anchor="end" font-size="21" font-weight="800" fill="#0f2747">مهارات إنسانية</text>
    <text x="1048" y="306" text-anchor="end" font-size="15" fill="#526173">تواصل، تحفيز، تعاون،</text>
    <text x="1048" y="330" text-anchor="end" font-size="15" fill="#526173">تعامل مع الخلافات</text>

    <rect x="430" y="450" width="340" height="142" rx="28" fill="#ffffff"/>
    <circle cx="720" cy="492" r="34" fill="#edf8f2"/>
    <text x="645" y="498" text-anchor="end" font-size="21" font-weight="800" fill="#0f2747">مهارات فكرية</text>
    <text x="720" y="546" text-anchor="end" font-size="15" fill="#526173">فهم الصورة الكبرى، تحليل المشكلات،</text>
    <text x="720" y="570" text-anchor="end" font-size="15" fill="#526173">وربط القرارات بالنتائج</text>
  </g>

  <g stroke="#d4a63a" stroke-width="5" stroke-linecap="round" opacity="0.8">
    <path d="M420 295 C390 292 382 292 362 292" fill="none"/>
    <path d="M780 295 C808 292 816 292 838 292" fill="none"/>
    <path d="M600 400 C600 426 600 430 600 450" fill="none"/>
  </g>
</svg>
