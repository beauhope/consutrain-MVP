<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="القيادة الظرفية">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 29px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 45px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .axis{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="95" class="title" text-anchor="middle">القيادة الظرفية</text>
  <text x="800" y="155" class="sub" text-anchor="middle">اختيار الأسلوب حسب مستوى التوجيه والدعم المطلوب</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="430" y="245" width="740" height="520" rx="36" fill="#ffffff" stroke="#c4d9ee" stroke-width="2"/></g>

  <line x1="520" y1="690" x2="1085" y2="690" stroke="#0f2d5d" stroke-width="5" stroke-linecap="round"/>
  <line x1="520" y1="690" x2="520" y2="325" stroke="#0f2d5d" stroke-width="5" stroke-linecap="round"/>
  <path d="M1070 672 l28 18 l-28 18" fill="none" stroke="#0f2d5d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M502 345 l18-28 l18 28" fill="none" stroke="#0f2d5d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="805" y="738" class="axis" text-anchor="middle">مستوى التوجيه</text>
  <text x="475" y="505" class="axis" text-anchor="middle" transform="rotate(-90 475 505)">مستوى الدعم</text>

  <g filter="url(#shadow)"><rect x="560" y="360" width="230" height="130" rx="24" fill="#edf5fe" stroke="#6fa7d9" stroke-width="2"/></g>
  <text x="675" y="412" class="h" text-anchor="middle">تدريب ودعم</text>
  <text x="675" y="455" class="p" text-anchor="middle">توجيه عالٍ ودعم عالٍ</text>

  <g filter="url(#shadow)"><rect x="835" y="360" width="230" height="130" rx="24" fill="#fff4df" stroke="#d6a843" stroke-width="2"/></g>
  <text x="950" y="412" class="h" text-anchor="middle">توجيه</text>
  <text x="950" y="455" class="p" text-anchor="middle">توجيه عالٍ ودعم أقل</text>

  <g filter="url(#shadow)"><rect x="560" y="535" width="230" height="130" rx="24" fill="#edf8ef" stroke="#7ab987" stroke-width="2"/></g>
  <text x="675" y="587" class="h" text-anchor="middle">دعم ومشاركة</text>
  <text x="675" y="630" class="p" text-anchor="middle">دعم عالٍ وتوجيه أقل</text>

  <g filter="url(#shadow)"><rect x="835" y="535" width="230" height="130" rx="24" fill="#f8edf9" stroke="#b08fe2" stroke-width="2"/></g>
  <text x="950" y="587" class="h" text-anchor="middle">تفويض</text>
  <text x="950" y="630" class="p" text-anchor="middle">توجيه أقل ودعم أقل</text>

  <g filter="url(#shadow)"><rect x="520" y="790" width="560" height="70" rx="28" fill="url(#main)" stroke="#e2b653" stroke-width="3"/></g>
  <text x="800" y="835" class="white2" text-anchor="middle">القائد الفعال يغير أسلوبه حسب الشخص والمهمة والموقف</text>
</svg>