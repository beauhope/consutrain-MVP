<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="ما هي الرقابة الإدارية">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 31px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 48px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>
  <circle cx="300" cy="150" r="52" fill="#dce9f7" opacity=".75"/>

  <text x="800" y="96" class="title" text-anchor="middle">ما هي الرقابة الإدارية؟</text>
  <text x="800" y="156" class="sub" text-anchor="middle">متابعة الأداء وتصحيح الانحرافات في الوقت المناسب</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="540" y="265" width="520" height="280" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M680 440 h240"/>
    <path d="M710 440 v-70 h55 v70"/>
    <path d="M790 440 v-115 h55 v115"/>
    <path d="M870 440 v-155 h55 v155"/>
    <circle cx="935" cy="315" r="36"/>
    <path d="M960 340 l42 42"/>
  </g>
  <text x="800" y="605" class="white" text-anchor="middle">الرقابة</text>
  <text x="800" y="660" class="white2" text-anchor="middle">قياس • مقارنة • تحليل • تصحيح</text>
  <rect x="620" y="688" width="360" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="725" class="pill" text-anchor="middle">حماية الخطة وتحسين الأداء</text>

  <g filter="url(#shadow)"><rect x="90" y="340" width="380" height="185" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="280" y="400" class="h" text-anchor="middle">مستهدفات واضحة</text>
  <line x1="165" y1="424" x2="395" y2="424" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="280" y="475" class="p" text-anchor="middle">أهداف ومؤشرات</text>
  <text x="280" y="512" class="p" text-anchor="middle">قابلة للقياس</text>

  <g filter="url(#shadow)"><rect x="1130" y="340" width="380" height="185" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1320" y="400" class="h" text-anchor="middle">متابعة وتحليل</text>
  <line x1="1210" y1="424" x2="1430" y2="424" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1320" y="475" class="p" text-anchor="middle">مقارنة النتائج</text>
  <text x="1320" y="512" class="p" text-anchor="middle">بما كان مخططًا</text>

  <g filter="url(#shadow)"><rect x="560" y="790" width="480" height="88" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="800" y="842" class="h" text-anchor="middle">تصحيح مبكر قبل تضخم المشكلة</text>

  <line x1="470" y1="432" x2="540" y2="432" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1060" y1="432" x2="1130" y2="432" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="800" y1="744" x2="800" y2="790" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <circle cx="540" cy="432" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
  <circle cx="1060" cy="432" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
  <circle cx="800" cy="744" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
</svg>