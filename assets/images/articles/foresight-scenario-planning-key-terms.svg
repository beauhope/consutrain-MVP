<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="مصطلحات استشراف المستقبل">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 56px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 21px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 42px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">مصطلحات استشراف المستقبل</text>
  <text x="800" y="156" class="sub" text-anchor="middle">من الإشارات الضعيفة إلى القوى المحركة والسيناريوهات</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="520" y="245" width="560" height="160" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="340" class="white" text-anchor="middle">Foresight Language</text>

  <path d="M260 560 H1340" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1320 540 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="105" y="485" width="250" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="230" y="545" class="h" text-anchor="middle">إشارات ضعيفة</text>
  <line x1="150" y1="570" x2="310" y2="570" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="230" y="620" class="p" text-anchor="middle">بدايات تغير محتمل</text>

  <g filter="url(#shadow)"><rect x="405" y="485" width="250" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="530" y="545" class="h" text-anchor="middle">متغيرات</text>
  <line x1="450" y1="570" x2="610" y2="570" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="530" y="620" class="p" text-anchor="middle">عوامل قابلة للتغير</text>

  <g filter="url(#shadow)"><rect x="705" y="485" width="250" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="830" y="545" class="h" text-anchor="middle">اتجاهات</text>
  <line x1="750" y1="570" x2="910" y2="570" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="830" y="620" class="p" text-anchor="middle">حركة تتكرر وتتوسع</text>

  <g filter="url(#shadow)"><rect x="1005" y="485" width="250" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1130" y="545" class="h" text-anchor="middle">قوى محركة</text>
  <line x1="1050" y1="570" x2="1210" y2="570" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1130" y="620" class="p" text-anchor="middle">عوامل تدفع التغير</text>

  <g filter="url(#shadow)"><rect x="1305" y="485" width="220" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1415" y="545" class="h" text-anchor="middle">سيناريوهات</text>
  <line x1="1350" y1="570" x2="1480" y2="570" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1415" y="620" class="p" text-anchor="middle">بدائل مستقبلية</text>

  <g filter="url(#shadow)">
    <rect x="390" y="780" width="820" height="62" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="820" class="h" text-anchor="middle">وضوح المصطلحات يجعل ورشة الاستشراف أكثر دقة وأقل تشتتًا</text>
</svg>