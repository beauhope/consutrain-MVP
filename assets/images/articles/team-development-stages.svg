<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="مراحل تطوير فرق العمل">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .num{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">مراحل تطوير فرق العمل</text>
  <text x="800" y="156" class="sub" text-anchor="middle">نموذج تكمان: من التشكيل إلى الأداء ثم الإنهاء</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <path d="M200 515 H1390" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1370 495 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="70" y="390" width="250" height="230" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="195" cy="365" r="34" fill="#0f2d5d"/><text x="195" y="375" class="num" text-anchor="middle">1</text>
  <text x="195" y="455" class="h" text-anchor="middle">التشكيل</text>
  <line x1="125" y1="480" x2="265" y2="480" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="195" y="530" class="p" text-anchor="middle">تعارف وهدف</text>
  <text x="195" y="565" class="p" text-anchor="middle">وأدوار أولية</text>

  <g filter="url(#shadow)"><rect x="360" y="390" width="250" height="230" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="485" cy="365" r="34" fill="#0f2d5d"/><text x="485" y="375" class="num" text-anchor="middle">2</text>
  <text x="485" y="455" class="h" text-anchor="middle">العصف</text>
  <line x1="415" y1="480" x2="555" y2="480" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="485" y="530" class="p" text-anchor="middle">اختلاف وتوتر</text>
  <text x="485" y="565" class="p" text-anchor="middle">يحتاج إدارة</text>

  <g filter="url(#shadow)"><rect x="650" y="390" width="250" height="230" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="775" cy="365" r="34" fill="#0f2d5d"/><text x="775" y="375" class="num" text-anchor="middle">3</text>
  <text x="775" y="455" class="h" text-anchor="middle">وضع المعايير</text>
  <line x1="690" y1="480" x2="860" y2="480" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="775" y="530" class="p" text-anchor="middle">قواعد وثقة</text>
  <text x="775" y="565" class="p" text-anchor="middle">وطريقة عمل</text>

  <g filter="url(#shadow)"><rect x="940" y="390" width="250" height="230" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1065" cy="365" r="34" fill="#0f2d5d"/><text x="1065" y="375" class="num" text-anchor="middle">4</text>
  <text x="1065" y="455" class="h" text-anchor="middle">الأداء</text>
  <line x1="995" y1="480" x2="1135" y2="480" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="1065" y="530" class="p" text-anchor="middle">تنسيق وإنجاز</text>
  <text x="1065" y="565" class="p" text-anchor="middle">ونتائج أوضح</text>

  <g filter="url(#shadow)"><rect x="1230" y="390" width="250" height="230" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1355" cy="365" r="34" fill="#0f2d5d"/><text x="1355" y="375" class="num" text-anchor="middle">5</text>
  <text x="1355" y="455" class="h" text-anchor="middle">الإنهاء</text>
  <line x1="1285" y1="480" x2="1425" y2="480" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1355" y="530" class="p" text-anchor="middle">إغلاق وتعلم</text>
  <text x="1355" y="565" class="p" text-anchor="middle">ودروس مستفادة</text>

  <g filter="url(#shadow)">
    <rect x="475" y="710" width="650" height="90" rx="30" fill="#0f2d5d" stroke="#e2b653" stroke-width="3"/>
  </g>
  <text x="800" y="766" style="font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff" text-anchor="middle">القائد الجيد لا يتوقع الانسجام الفوري، بل يدير مراحل النمو</text>
</svg>