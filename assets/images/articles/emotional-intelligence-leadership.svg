<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="الذكاء العاطفي ودوره في القيادة">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 29px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 44px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">الذكاء العاطفي ودوره في القيادة</text>
  <text x="800" y="156" class="sub" text-anchor="middle">وعي بالذات، إدارة للمشاعر، وفهم أفضل للآخرين</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="545" y="270" width="510" height="265" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M800 415 c-80-70-145-110-145-175 c0-45 35-78 78-78 c30 0 55 16 67 40 c12-24 37-40 67-40 c43 0 78 33 78 78 c0 65-65 105-145 175z"/>
    <circle cx="800" cy="272" r="34"/>
    <path d="M750 330 q50 38 100 0"/>
  </g>
  <text x="800" y="615" class="white" text-anchor="middle">قيادة بوعي عاطفي</text>
  <text x="800" y="670" class="white2" text-anchor="middle">حزم دون انفعال، وتعاطف دون تسيب</text>
  <rect x="615" y="697" width="370" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="734" class="pill" text-anchor="middle">ثقة وتواصل أفضل</text>

  <g filter="url(#shadow)"><rect x="90" y="320" width="360" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="378" class="h" text-anchor="middle">الوعي بالذات</text>
  <line x1="170" y1="401" x2="370" y2="401" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="450" class="p" text-anchor="middle">فهم أثر المشاعر والسلوك</text>

  <g filter="url(#shadow)"><rect x="1150" y="320" width="360" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="378" class="h" text-anchor="middle">إدارة المشاعر</text>
  <line x1="1230" y1="401" x2="1430" y2="401" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="450" class="p" text-anchor="middle">توازن تحت الضغط</text>

  <g filter="url(#shadow)"><rect x="90" y="625" width="360" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="683" class="h" text-anchor="middle">التعاطف</text>
  <line x1="170" y1="706" x2="370" y2="706" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="755" class="p" text-anchor="middle">فهم الموقف قبل الحكم</text>

  <g filter="url(#shadow)"><rect x="1150" y="625" width="360" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="683" class="h" text-anchor="middle">إدارة العلاقات</text>
  <line x1="1230" y1="706" x2="1430" y2="706" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="755" class="p" text-anchor="middle">ثقة وحوار وحل خلافات</text>

  <line x1="450" y1="402" x2="545" y2="402" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1055" y1="402" x2="1150" y2="402" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="450" y1="707" x2="620" y2="535" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1150" y1="707" x2="980" y2="535" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>