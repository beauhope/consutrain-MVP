<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="مصفوفة 2x2 للتخطيط بالسيناريو">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 56px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .axis{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">مصفوفة 2x2 للتخطيط بالسيناريو</text>
  <text x="800" y="156" class="sub" text-anchor="middle">أربعة مشاهد مستقبلية من عاملين حاسمين في عدم اليقين</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g transform="translate(360,250)" filter="url(#shadow)">
    <rect x="0" y="0" width="880" height="520" rx="34" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>

  <g transform="translate(400,285)">
    <line x1="0" y1="240" x2="800" y2="240" stroke="#0f2d5d" stroke-width="6" stroke-linecap="round"/>
    <line x1="400" y1="0" x2="400" y2="480" stroke="#0f2d5d" stroke-width="6" stroke-linecap="round"/>

    <rect x="35" y="35" width="310" height="160" rx="26" fill="#f7fbff" stroke="#dbe7f4" stroke-width="2"/>
    <rect x="455" y="35" width="310" height="160" rx="26" fill="#fff8ee" stroke="#ead7ad" stroke-width="2"/>
    <rect x="35" y="285" width="310" height="160" rx="26" fill="#fff8ee" stroke="#ead7ad" stroke-width="2"/>
    <rect x="455" y="285" width="310" height="160" rx="26" fill="#f7fbff" stroke="#dbe7f4" stroke-width="2"/>

    <text x="190" y="95" class="h" text-anchor="middle">سيناريو 1</text>
    <text x="190" y="140" class="p" text-anchor="middle">أثر عالٍ / اتجاه أ</text>

    <text x="610" y="95" class="h" text-anchor="middle">سيناريو 2</text>
    <text x="610" y="140" class="p" text-anchor="middle">أثر عالٍ / اتجاه ب</text>

    <text x="190" y="345" class="h" text-anchor="middle">سيناريو 3</text>
    <text x="190" y="390" class="p" text-anchor="middle">مسار مختلف</text>

    <text x="610" y="345" class="h" text-anchor="middle">سيناريو 4</text>
    <text x="610" y="390" class="p" text-anchor="middle">بديل مستقبلي آخر</text>

    <text x="400" y="-22" class="axis" text-anchor="middle">عامل عدم اليقين الأول</text>
    <text x="400" y="525" class="axis" text-anchor="middle">من اتجاه إلى اتجاه مقابل</text>
    <text x="-55" y="245" class="axis" text-anchor="middle" transform="rotate(-90 -55 245)">عامل عدم اليقين الثاني</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="805" width="660" height="55" rx="27" fill="url(#main)" stroke="#e2b653" stroke-width="3"/>
  </g>
  <text x="800" y="842" class="white" text-anchor="middle">اختيار العاملين أهم من شكل المصفوفة</text>
</svg>