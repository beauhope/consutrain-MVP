<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="عالم VUCA واستشراف المستقبل">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .letter{font:700 54px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .h{font:700 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 52px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">عالم VUCA</text>
  <text x="800" y="156" class="sub" text-anchor="middle">لماذا نحتاج إلى الاستشراف في بيئة مضطربة؟</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="555" y="255" width="490" height="175" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="335" class="white" text-anchor="middle">VUCA</text>
  <text x="800" y="385" class="white2" text-anchor="middle">Volatility • Uncertainty • Complexity • Ambiguity</text>

  <g filter="url(#shadow)"><rect x="120" y="520" width="300" height="180" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="270" cy="500" r="44" fill="#0f2d5d"/><text x="270" y="517" class="letter" text-anchor="middle">V</text>
  <text x="270" y="580" class="h" text-anchor="middle">Volatility</text>
  <text x="270" y="635" class="p" text-anchor="middle">تقلب وسرعة تغير</text>

  <g filter="url(#shadow)"><rect x="470" y="520" width="300" height="180" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="620" cy="500" r="44" fill="#0f2d5d"/><text x="620" y="517" class="letter" text-anchor="middle">U</text>
  <text x="620" y="580" class="h" text-anchor="middle">Uncertainty</text>
  <text x="620" y="635" class="p" text-anchor="middle">عدم يقين وبدائل</text>

  <g filter="url(#shadow)"><rect x="820" y="520" width="300" height="180" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="970" cy="500" r="44" fill="#0f2d5d"/><text x="970" y="517" class="letter" text-anchor="middle">C</text>
  <text x="970" y="580" class="h" text-anchor="middle">Complexity</text>
  <text x="970" y="635" class="p" text-anchor="middle">ترابط عوامل كثيرة</text>

  <g filter="url(#shadow)"><rect x="1170" y="520" width="300" height="180" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1320" cy="500" r="44" fill="#0f2d5d"/><text x="1320" y="517" class="letter" text-anchor="middle">A</text>
  <text x="1320" y="580" class="h" text-anchor="middle">Ambiguity</text>
  <text x="1320" y="635" class="p" text-anchor="middle">التباس في المعنى</text>

  <g filter="url(#shadow)">
    <rect x="390" y="785" width="820" height="62" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="825" class="h" text-anchor="middle">في عالم VUCA لا تكفي خطة واحدة، بل نحتاج إلى استشراف وسيناريوهات</text>
</svg>