<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="إطار Scrum في إدارة المشاريع">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 48px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>
  <text x="800" y="96" class="title" text-anchor="middle">إطار Scrum</text>
  <text x="800" y="156" class="sub" text-anchor="middle">أدوار، أحداث، ومخرجات لتقديم قيمة في دورات قصيرة</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="540" y="255" width="520" height="250" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="340" class="white" text-anchor="middle">Sprint</text>
  <text x="800" y="400" class="white2" text-anchor="middle">دورة قصيرة تنتج Increment قابلًا للفحص</text>
  <rect x="615" y="435" width="370" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="472" class="pill" text-anchor="middle">فحص وتكيّف وتحسين</text>

  <g filter="url(#shadow)"><rect x="90" y="300" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="355" class="h" text-anchor="middle">3 أدوار</text>
  <line x1="170" y1="378" x2="370" y2="378" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="425" class="p" text-anchor="middle">PO • SM • Developers</text>

  <g filter="url(#shadow)"><rect x="1150" y="300" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="355" class="h" text-anchor="middle">3 مخرجات</text>
  <line x1="1230" y1="378" x2="1430" y2="378" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="425" class="p" text-anchor="middle">Backlog • Sprint • Increment</text>

  <g filter="url(#shadow)"><rect x="90" y="610" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="665" class="h" text-anchor="middle">5 أحداث</text>
  <line x1="170" y1="688" x2="370" y2="688" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="735" class="p" text-anchor="middle">Planning • Daily • Review</text>

  <g filter="url(#shadow)"><rect x="1150" y="610" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="665" class="h" text-anchor="middle">قيمة تدريجية</text>
  <line x1="1230" y1="688" x2="1430" y2="688" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="735" class="p" text-anchor="middle">نتائج قابلة للفحص مبكرًا</text>

  <path d="M640 645 C555 570 555 445 650 385" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M960 385 C1045 460 1045 585 950 645" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M650 385 l-45 5 l25-38" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M950 645 l45-5 l-25 38" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="480" y="790" width="640" height="65" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="832" class="h" text-anchor="middle">Scrum يجعل التقدم مرئيًا والمشكلات قابلة للعلاج مبكرًا</text>
</svg>