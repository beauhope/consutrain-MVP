<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="اختيار أسلوب القيادة المناسب">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 42px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">اختيار أسلوب القيادة المناسب</text>
  <text x="800" y="156" class="sub" text-anchor="middle">قرار قيادي يعتمد على المهمة والفريق والوقت والمخاطر</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="540" y="265" width="520" height="245" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/></g>
  <text x="800" y="350" class="white" text-anchor="middle">كيف أختار الأسلوب؟</text>
  <text x="800" y="410" class="white2" text-anchor="middle">لا تبدأ من تفضيلك الشخصي</text>
  <rect x="620" y="435" width="360" height="55" rx="28" fill="#edbf56"/>
  <text x="800" y="472" style="font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d" text-anchor="middle">ابدأ من السياق</text>

  <g filter="url(#shadow)"><rect x="85" y="315" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="370" class="h" text-anchor="middle">طبيعة المهمة</text>
  <line x1="170" y1="393" x2="360" y2="393" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="440" class="p" text-anchor="middle">واضحة أم جديدة ومعقدة؟</text>

  <g filter="url(#shadow)"><rect x="1155" y="315" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="370" class="h" text-anchor="middle">خبرة الفريق</text>
  <line x1="1240" y1="393" x2="1430" y2="393" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="440" class="p" text-anchor="middle">مبتدئ أم خبير؟</text>

  <g filter="url(#shadow)"><rect x="85" y="610" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="665" class="h" text-anchor="middle">ضغط الوقت</text>
  <line x1="170" y1="688" x2="360" y2="688" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="735" class="p" text-anchor="middle">هل نحتاج حسمًا سريعًا؟</text>

  <g filter="url(#shadow)"><rect x="1155" y="610" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="665" class="h" text-anchor="middle">حجم المخاطر</text>
  <line x1="1240" y1="688" x2="1430" y2="688" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="735" class="p" text-anchor="middle">ما أثر القرار؟</text>

  <g filter="url(#shadow)"><rect x="560" y="635" width="480" height="150" rx="30" fill="#ffffff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="800" y="700" class="h" text-anchor="middle">النتيجة</text>
  <text x="800" y="745" class="p" text-anchor="middle">توجيه، مشاركة، دعم، أو تفويض</text>

  <line x1="445" y1="392" x2="540" y2="392" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1060" y1="392" x2="1155" y2="392" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="445" y1="688" x2="560" y2="710" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1155" y1="688" x2="1040" y2="710" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="800" y1="510" x2="800" y2="635" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>