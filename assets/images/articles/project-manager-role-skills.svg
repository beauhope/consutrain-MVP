<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="مدير المشروع">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 29px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 46px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">من هو مدير المشروع؟</text>
  <text x="800" y="156" class="sub" text-anchor="middle">حلقة وصل بين الفكرة والخطة والفريق والتنفيذ</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="540" y="265" width="520" height="265" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/></g>
  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="800" cy="340" r="38"/>
    <path d="M725 445 q75-65 150 0"/>
    <path d="M800 378 v70"/>
    <path d="M680 395 h70 M850 395 h70"/>
    <circle cx="655" cy="395" r="18"/><circle cx="945" cy="395" r="18"/>
  </g>
  <text x="800" y="600" class="white" text-anchor="middle">مدير المشروع</text>
  <text x="800" y="655" class="white2" text-anchor="middle">ينسق ويقود ويتابع ويصحح المسار</text>
  <rect x="615" y="682" width="370" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="719" class="pill" text-anchor="middle">من الخطة إلى التسليم</text>

  <g filter="url(#shadow)"><rect x="90" y="315" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="370" class="h" text-anchor="middle">التخطيط</text>
  <line x1="170" y1="393" x2="360" y2="393" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="440" class="p" text-anchor="middle">نطاق، مراحل، موارد</text>

  <g filter="url(#shadow)"><rect x="1160" y="315" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="370" class="h" text-anchor="middle">التواصل</text>
  <line x1="1240" y1="393" x2="1430" y2="393" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="440" class="p" text-anchor="middle">فريق وأصحاب مصلحة</text>

  <g filter="url(#shadow)"><rect x="90" y="610" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="665" class="h" text-anchor="middle">إدارة المخاطر</text>
  <line x1="160" y1="688" x2="370" y2="688" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="735" class="p" text-anchor="middle">توقع واستجابة مبكرة</text>

  <g filter="url(#shadow)"><rect x="1160" y="610" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="665" class="h" text-anchor="middle">تصحيح المسار</text>
  <line x1="1230" y1="688" x2="1440" y2="688" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="735" class="p" text-anchor="middle">متابعة وانحرافات وقرارات</text>

  <line x1="440" y1="392" x2="540" y2="392" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1060" y1="392" x2="1160" y2="392" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="440" y1="688" x2="620" y2="530" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1160" y1="688" x2="980" y2="530" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>