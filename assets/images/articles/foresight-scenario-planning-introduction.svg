<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="استشراف المستقبل والتخطيط بالسيناريو">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 56px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 44px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">استشراف المستقبل والتخطيط بالسيناريو</text>
  <text x="800" y="156" class="sub" text-anchor="middle">قراءة المتغيرات وبناء بدائل تساعد على اتخاذ القرار</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="520" y="250" width="560" height="190" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="330" class="white" text-anchor="middle">Future Foresight</text>
  <text x="800" y="382" class="white2" text-anchor="middle">من الإشارات إلى السيناريوهات</text>

  <path d="M245 610 H1355" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1335 590 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="90" y="520" width="300" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="240" y="585" class="h" text-anchor="middle">تحليل البيئة</text>
  <line x1="150" y1="610" x2="330" y2="610" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="240" y="660" class="p" text-anchor="middle">PESTEL وVRIO والسوق</text>

  <g filter="url(#shadow)"><rect x="455" y="520" width="300" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="605" y="585" class="h" text-anchor="middle">رصد الإشارات</text>
  <line x1="515" y1="610" x2="695" y2="610" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="605" y="660" class="p" text-anchor="middle">اتجاهات وتغيرات مبكرة</text>

  <g filter="url(#shadow)"><rect x="820" y="520" width="300" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="970" y="585" class="h" text-anchor="middle">بناء السيناريو</text>
  <line x1="880" y1="610" x2="1060" y2="610" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="970" y="660" class="p" text-anchor="middle">بدائل مستقبلية محتملة</text>

  <g filter="url(#shadow)"><rect x="1185" y="520" width="300" height="175" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="585" class="h" text-anchor="middle">قرار أكثر استعدادًا</text>
  <line x1="1245" y1="610" x2="1425" y2="610" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="660" class="p" text-anchor="middle">خيارات ومرونة أعلى</text>

  <g filter="url(#shadow)">
    <rect x="420" y="780" width="760" height="62" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="820" class="h" text-anchor="middle">السيناريو لا يتنبأ بالمستقبل، بل يساعدنا على الاستعداد له</text>
</svg>