<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="القيادة في عصر التكنولوجيا">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 23px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 45px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>
  <text x="800" y="96" class="title" text-anchor="middle">القيادة في عصر التكنولوجيا</text>
  <text x="800" y="156" class="sub" text-anchor="middle">اتصال رقمي، فرق موزعة، وثقة مبنية على النتائج</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="525" y="260" width="550" height="290" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/></g>
  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="700" y="318" width="200" height="130" rx="22"/>
    <path d="M700 400 h200"/>
    <circle cx="800" cy="360" r="28"/>
    <path d="M760 500 h80"/>
    <path d="M800 448 v52"/>
    <path d="M610 380 h60 M930 380 h60 M800 250 v42"/>
    <circle cx="585" cy="380" r="18"/><circle cx="1015" cy="380" r="18"/><circle cx="800" cy="230" r="18"/>
  </g>
  <text x="800" y="620" class="white" text-anchor="middle">قائد رقمي</text>
  <text x="800" y="675" class="white2" text-anchor="middle">يقود بالوضوح والثقة لا بالحضور الجسدي فقط</text>
  <rect x="615" y="702" width="370" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="739" class="pill" text-anchor="middle">تكنولوجيا تخدم الناس والعمل</text>

  <g filter="url(#shadow)"><rect x="85" y="340" width="360" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="400" class="h" text-anchor="middle">اتصال ثنائي</text>
  <line x1="170" y1="423" x2="360" y2="423" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="472" class="p" text-anchor="middle">حوار واضح وليس أوامر فقط</text>

  <g filter="url(#shadow)"><rect x="1155" y="340" width="360" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="400" class="h" text-anchor="middle">فرق موزعة</text>
  <line x1="1240" y1="423" x2="1430" y2="423" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="472" class="p" text-anchor="middle">متابعة نتائج لا مراقبة مستمرة</text>

  <g filter="url(#shadow)"><rect x="110" y="650" width="390" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="305" y="710" class="h" text-anchor="middle">تحفيز وانتماء</text>
  <line x1="205" y1="733" x2="405" y2="733" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="305" y="782" class="p" text-anchor="middle">معنى للعمل رغم البعد</text>

  <g filter="url(#shadow)"><rect x="1100" y="650" width="390" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1295" y="710" class="h" text-anchor="middle">تعلم مستمر</text>
  <line x1="1195" y1="733" x2="1395" y2="733" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1295" y="782" class="p" text-anchor="middle">أدوات جديدة وسياقات متغيرة</text>

  <line x1="445" y1="425" x2="525" y2="425" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1075" y1="425" x2="1155" y2="425" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="500" y1="735" x2="620" y2="550" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1100" y1="735" x2="980" y2="550" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>