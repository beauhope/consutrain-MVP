<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="تطبيق منهجية Lean ومبادئ التحسين المستمر">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 21px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .num{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white{font:700 42px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 25px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">تطبيق منهجية Lean</text>
  <text x="800" y="156" class="sub" text-anchor="middle">خمسة مبادئ لتحسين التدفق وتقليل الهدر وزيادة القيمة</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="520" y="255" width="560" height="170" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="330" class="white" text-anchor="middle">Lean Principles</text>
  <text x="800" y="382" class="white2" text-anchor="middle">من القيمة إلى التحسين المستمر</text>

  <path d="M250 590 H1350" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1330 570 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="95" y="500" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="217" cy="480" r="34" fill="#0f2d5d"/><text x="217" y="490" class="num" text-anchor="middle">1</text>
  <text x="217" y="560" class="h" text-anchor="middle">تحديد القيمة</text>
  <line x1="145" y1="585" x2="290" y2="585" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="217" y="632" class="p" text-anchor="middle">ما يهم العميل</text>

  <g filter="url(#shadow)"><rect x="370" y="500" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="492" cy="480" r="34" fill="#0f2d5d"/><text x="492" y="490" class="num" text-anchor="middle">2</text>
  <text x="492" y="560" class="h" text-anchor="middle">تدفق القيمة</text>
  <line x1="420" y1="585" x2="565" y2="585" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="492" y="632" class="p" text-anchor="middle">رسم رحلة العمل</text>

  <g filter="url(#shadow)"><rect x="645" y="500" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="767" cy="480" r="34" fill="#0f2d5d"/><text x="767" y="490" class="num" text-anchor="middle">3</text>
  <text x="767" y="560" class="h" text-anchor="middle">تحقيق التدفق</text>
  <line x1="695" y1="585" x2="840" y2="585" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="767" y="632" class="p" text-anchor="middle">إزالة العوائق</text>

  <g filter="url(#shadow)"><rect x="920" y="500" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1042" cy="480" r="34" fill="#0f2d5d"/><text x="1042" y="490" class="num" text-anchor="middle">4</text>
  <text x="1042" y="560" class="h" text-anchor="middle">نظام السحب</text>
  <line x1="970" y1="585" x2="1115" y2="585" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1042" y="632" class="p" text-anchor="middle">حسب الحاجة الفعلية</text>

  <g filter="url(#shadow)"><rect x="1195" y="500" width="285" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1337" cy="480" r="34" fill="#0f2d5d"/><text x="1337" y="490" class="num" text-anchor="middle">5</text>
  <text x="1337" y="560" class="h" text-anchor="middle">التحسين المستمر</text>
  <line x1="1250" y1="585" x2="1425" y2="585" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1337" y="632" class="p" text-anchor="middle">تعلم وتطوير دائم</text>

  <g filter="url(#shadow)">
    <rect x="420" y="760" width="760" height="82" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="812" class="h" text-anchor="middle">Lean لا يخفض الموارد فقط، بل يوجهها نحو القيمة الحقيقية</text>
</svg>