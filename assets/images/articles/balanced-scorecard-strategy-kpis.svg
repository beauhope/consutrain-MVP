<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="بطاقة الأداء المتوازن BSC">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 44px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">بطاقة الأداء المتوازن BSC</text>
  <text x="800" y="156" class="sub" text-anchor="middle">ترجمة الاستراتيجية إلى أهداف ومؤشرات ومبادرات</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="540" y="315" width="520" height="220" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="405" class="white" text-anchor="middle">Strategy</text>
  <text x="800" y="462" class="white2" text-anchor="middle">أهداف • مؤشرات • مستهدفات • مبادرات</text>

  <g filter="url(#shadow)"><rect x="120" y="270" width="360" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="300" y="330" class="h" text-anchor="middle">المالي</text>
  <line x1="210" y1="355" x2="390" y2="355" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="300" y="405" class="p" text-anchor="middle">نتائج واستدامة مالية</text>

  <g filter="url(#shadow)"><rect x="1120" y="270" width="360" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1300" y="330" class="h" text-anchor="middle">العملاء</text>
  <line x1="1210" y1="355" x2="1390" y2="355" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="1300" y="405" class="p" text-anchor="middle">رضا وقيمة وتجربة</text>

  <g filter="url(#shadow)"><rect x="120" y="610" width="360" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="300" y="670" class="h" text-anchor="middle">العمليات الداخلية</text>
  <line x1="190" y1="695" x2="410" y2="695" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="300" y="745" class="p" text-anchor="middle">كفاءة وجودة وسرعة</text>

  <g filter="url(#shadow)"><rect x="1120" y="610" width="360" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1300" y="670" class="h" text-anchor="middle">التعلم والنمو</text>
  <line x1="1190" y1="695" x2="1410" y2="695" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1300" y="745" class="p" text-anchor="middle">قدرات ومعرفة وتطوير</text>

  <line x1="480" y1="355" x2="540" y2="395" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1120" y1="355" x2="1060" y2="395" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="480" y1="695" x2="540" y2="475" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1120" y1="695" x2="1060" y2="475" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="415" y="805" width="770" height="60" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="844" class="h" text-anchor="middle">الأداء المتوازن لا يقيس المال فقط، بل يقيس ما يصنع المال والقيمة</text>
</svg>