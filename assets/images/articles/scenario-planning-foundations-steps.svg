<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="خطوات التخطيط بالسيناريو">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 56px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 21px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 42px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .num{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">أسس وخطوات التخطيط بالسيناريو</text>
  <text x="800" y="156" class="sub" text-anchor="middle">من السؤال الاستراتيجي إلى قرارات أكثر استعدادًا</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="500" y="235" width="600" height="150" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="325" class="white" text-anchor="middle">Scenario Planning Process</text>

  <path d="M200 560 H1400" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1380 540 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="80" y="475" width="220" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="190" cy="455" r="34" fill="#0f2d5d"/><text x="190" y="466" class="num" text-anchor="middle">1</text>
  <text x="190" y="535" class="h" text-anchor="middle">السؤال</text>
  <text x="190" y="590" class="p" text-anchor="middle">ما القضية؟</text>

  <g filter="url(#shadow)"><rect x="335" y="475" width="220" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="445" cy="455" r="34" fill="#0f2d5d"/><text x="445" y="466" class="num" text-anchor="middle">2</text>
  <text x="445" y="535" class="h" text-anchor="middle">القوى المحركة</text>
  <text x="445" y="590" class="p" text-anchor="middle">ما الذي يدفع التغير؟</text>

  <g filter="url(#shadow)"><rect x="590" y="475" width="220" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="700" cy="455" r="34" fill="#0f2d5d"/><text x="700" y="466" class="num" text-anchor="middle">3</text>
  <text x="700" y="535" class="h" text-anchor="middle">عدم اليقين</text>
  <text x="700" y="590" class="p" text-anchor="middle">ما الأكثر غموضًا؟</text>

  <g filter="url(#shadow)"><rect x="845" y="475" width="220" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="955" cy="455" r="34" fill="#0f2d5d"/><text x="955" y="466" class="num" text-anchor="middle">4</text>
  <text x="955" y="535" class="h" text-anchor="middle">السيناريوهات</text>
  <text x="955" y="590" class="p" text-anchor="middle">ما البدائل؟</text>

  <g filter="url(#shadow)"><rect x="1100" y="475" width="220" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1210" cy="455" r="34" fill="#0f2d5d"/><text x="1210" y="466" class="num" text-anchor="middle">5</text>
  <text x="1210" y="535" class="h" text-anchor="middle">الآثار</text>
  <text x="1210" y="590" class="p" text-anchor="middle">ماذا يعني ذلك؟</text>

  <g filter="url(#shadow)"><rect x="1355" y="475" width="180" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1445" cy="455" r="34" fill="#0f2d5d"/><text x="1445" y="466" class="num" text-anchor="middle">6</text>
  <text x="1445" y="535" class="h" text-anchor="middle">القرار</text>
  <text x="1445" y="590" class="p" text-anchor="middle">كيف نستعد؟</text>

  <g filter="url(#shadow)">
    <rect x="410" y="780" width="780" height="62" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="820" class="h" text-anchor="middle">السيناريوهات الجيدة تبدأ بسؤال واضح وتنتهي بقرار قابل للتنفيذ</text>
</svg>