<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="عجلة المستقبل Futures Wheel">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 56px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 25px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 20px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 36px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">عجلة المستقبل Futures Wheel</text>
  <text x="800" y="156" class="sub" text-anchor="middle">تحليل الآثار المباشرة وغير المباشرة للتغيرات</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <circle cx="800" cy="470" r="110" fill="url(#main)" stroke="#e2b653" stroke-width="5"/>
  </g>
  <text x="800" y="455" class="white" text-anchor="middle">التغير</text>
  <text x="800" y="500" class="white2" text-anchor="middle">الحدث أو الاتجاه</text>

  <g stroke="#d5a033" stroke-width="5" stroke-linecap="round">
    <line x1="800" y1="360" x2="800" y2="260"/>
    <line x1="895" y1="415" x2="1040" y2="330"/>
    <line x1="895" y1="525" x2="1040" y2="610"/>
    <line x1="800" y1="580" x2="800" y2="705"/>
    <line x1="705" y1="525" x2="560" y2="610"/>
    <line x1="705" y1="415" x2="560" y2="330"/>
  </g>

  <g filter="url(#shadow)"><rect x="655" y="205" width="290" height="100" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="800" y="250" class="h" text-anchor="middle">أثر مباشر</text>
  <text x="800" y="285" class="p" text-anchor="middle">نتيجة أولى للتغير</text>

  <g filter="url(#shadow)"><rect x="1020" y="285" width="310" height="110" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1175" y="335" class="h" text-anchor="middle">أثر مباشر</text>
  <text x="1175" y="370" class="p" text-anchor="middle">تغير في العملاء أو السوق</text>

  <g filter="url(#shadow)"><rect x="1020" y="575" width="310" height="110" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1175" y="625" class="h" text-anchor="middle">أثر غير مباشر</text>
  <text x="1175" y="660" class="p" text-anchor="middle">نتيجة لاحقة للأثر الأول</text>

  <g filter="url(#shadow)"><rect x="655" y="705" width="290" height="110" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="800" y="755" class="h" text-anchor="middle">فرصة أو خطر</text>
  <text x="800" y="790" class="p" text-anchor="middle">قرار يحتاج متابعة</text>

  <g filter="url(#shadow)"><rect x="270" y="575" width="310" height="110" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="425" y="625" class="h" text-anchor="middle">أثر غير مباشر</text>
  <text x="425" y="660" class="p" text-anchor="middle">تغير في العمليات والموارد</text>

  <g filter="url(#shadow)"><rect x="270" y="285" width="310" height="110" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="425" y="335" class="h" text-anchor="middle">أثر مباشر</text>
  <text x="425" y="370" class="p" text-anchor="middle">تغير في طريقة العمل</text>

  <g filter="url(#shadow)">
    <rect x="410" y="835" width="780" height="46" rx="23" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="866" class="h" text-anchor="middle">كل تغير مهم ينتج سلسلة آثار يجب فهمها قبل اتخاذ القرار</text>
</svg>