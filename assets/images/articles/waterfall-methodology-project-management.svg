<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="منهجية Waterfall في إدارة المشاريع">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 25px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 20px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 44px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .num{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">منهجية Waterfall</text>
  <text x="800" y="156" class="sub" text-anchor="middle">تسلسل واضح من المتطلبات إلى الصيانة والتحسين</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="515" y="240" width="570" height="150" rx="40" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="315" class="white" text-anchor="middle">Waterfall Methodology</text>
  <text x="800" y="365" class="white2" text-anchor="middle">خطوات متتابعة ومخرجات موثقة</text>

  <path d="M220 520 H1380" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1360 500 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="90" y="455" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="212" cy="435" r="34" fill="#0f2d5d"/><text x="212" y="445" class="num" text-anchor="middle">1</text>
  <text x="212" y="515" class="h" text-anchor="middle">المتطلبات</text>
  <line x1="145" y1="538" x2="280" y2="538" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="212" y="585" class="p" text-anchor="middle">أهداف ونطاق وجدوى</text>

  <g filter="url(#shadow)"><rect x="365" y="455" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="487" cy="435" r="34" fill="#0f2d5d"/><text x="487" y="445" class="num" text-anchor="middle">2</text>
  <text x="487" y="515" class="h" text-anchor="middle">التصميم</text>
  <line x1="420" y1="538" x2="555" y2="538" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="487" y="585" class="p" text-anchor="middle">مواصفات وحلول</text>

  <g filter="url(#shadow)"><rect x="640" y="455" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="762" cy="435" r="34" fill="#0f2d5d"/><text x="762" y="445" class="num" text-anchor="middle">3</text>
  <text x="762" y="515" class="h" text-anchor="middle">التنفيذ</text>
  <line x1="695" y1="538" x2="830" y2="538" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="762" y="585" class="p" text-anchor="middle">بناء المخرجات</text>

  <g filter="url(#shadow)"><rect x="915" y="455" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1037" cy="435" r="34" fill="#0f2d5d"/><text x="1037" y="445" class="num" text-anchor="middle">4</text>
  <text x="1037" y="515" class="h" text-anchor="middle">الاختبار</text>
  <line x1="970" y1="538" x2="1105" y2="538" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1037" y="585" class="p" text-anchor="middle">تحقق وقبول UAT</text>

  <g filter="url(#shadow)"><rect x="1190" y="455" width="245" height="170" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1312" cy="435" r="34" fill="#0f2d5d"/><text x="1312" y="445" class="num" text-anchor="middle">5</text>
  <text x="1312" y="515" class="h" text-anchor="middle">الصيانة</text>
  <line x1="1245" y1="538" x2="1380" y2="538" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1312" y="585" class="p" text-anchor="middle">ملاحظات وتحسين</text>

  <g filter="url(#shadow)">
    <rect x="420" y="735" width="760" height="90" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="792" class="h" text-anchor="middle">مناسبة عندما تكون المتطلبات واضحة والتغيير محدودًا</text>
</svg>