<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="مجالات الرقابة داخل المؤسسة">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 23px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 46px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>
  <text x="800" y="96" class="title" text-anchor="middle">مجالات الرقابة داخل المؤسسة</text>
  <text x="800" y="156" class="sub" text-anchor="middle">رقابة متوازنة على الأداء والجودة والموارد والالتزام</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="560" y="285" width="480" height="230" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="382" class="white" text-anchor="middle">الرقابة الإدارية</text>
  <text x="800" y="440" class="white2" text-anchor="middle">رؤية شاملة لصحة الأداء المؤسسي</text>

  <g filter="url(#shadow)"><rect x="80" y="290" width="310" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="235" y="345" class="h" text-anchor="middle">الأداء</text>
  <line x1="150" y1="368" x2="320" y2="368" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="235" y="407" class="p" text-anchor="middle">نتائج ومؤشرات</text>

  <g filter="url(#shadow)"><rect x="80" y="475" width="310" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="235" y="530" class="h" text-anchor="middle">الجودة</text>
  <line x1="150" y1="553" x2="320" y2="553" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="235" y="592" class="p" text-anchor="middle">خدمات ومخرجات</text>

  <g filter="url(#shadow)"><rect x="80" y="660" width="310" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="235" y="715" class="h" text-anchor="middle">الموارد</text>
  <line x1="150" y1="738" x2="320" y2="738" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="235" y="777" class="p" text-anchor="middle">بشرية ومالية وتقنية</text>

  <g filter="url(#shadow)"><rect x="1210" y="290" width="310" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1365" y="345" class="h" text-anchor="middle">الوقت</text>
  <line x1="1280" y1="368" x2="1450" y2="368" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1365" y="407" class="p" text-anchor="middle">مواعيد ومراحل</text>

  <g filter="url(#shadow)"><rect x="1210" y="475" width="310" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1365" y="530" class="h" text-anchor="middle">التكاليف</text>
  <line x1="1280" y1="553" x2="1450" y2="553" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1365" y="592" class="p" text-anchor="middle">ميزانيات وانحرافات</text>

  <g filter="url(#shadow)"><rect x="1210" y="660" width="310" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1365" y="715" class="h" text-anchor="middle">الالتزام والمخاطر</text>
  <line x1="1260" y1="738" x2="1470" y2="738" stroke="#5fa0d9" stroke-width="4" stroke-linecap="round"/>
  <text x="1365" y="777" class="p" text-anchor="middle">سياسات وضوابط</text>

  <line x1="390" y1="358" x2="560" y2="380" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="390" y1="543" x2="560" y2="420" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="390" y1="728" x2="650" y2="515" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1040" y1="380" x2="1210" y2="358" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1040" y1="420" x2="1210" y2="543" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="950" y1="515" x2="1210" y2="728" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>