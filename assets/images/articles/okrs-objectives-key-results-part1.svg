<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="الأهداف والنتائج الرئيسية OKRs">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 48px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .kr{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">OKRs</text>
  <text x="800" y="156" class="sub" text-anchor="middle">أهداف طموحة مرتبطة بنتائج رئيسية قابلة للقياس</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="500" y="245" width="600" height="190" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="325" class="white" text-anchor="middle">Objective</text>
  <text x="800" y="378" class="white2" text-anchor="middle">هدف واضح وملهم يحدد الاتجاه</text>

  <path d="M800 435 V520" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M800 520 H300 V575" stroke="#d5a033" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M800 520 H800 V575" stroke="#d5a033" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M800 520 H1300 V575" stroke="#d5a033" stroke-width="7" stroke-linecap="round" fill="none"/>

  <g filter="url(#shadow)"><rect x="125" y="575" width="350" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="300" cy="555" r="38" fill="#0f2d5d"/>
  <text x="300" y="565" class="kr" text-anchor="middle">KR1</text>
  <text x="300" y="635" class="h" text-anchor="middle">نتيجة رئيسية</text>
  <line x1="205" y1="660" x2="395" y2="660" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="300" y="705" class="p" text-anchor="middle">مؤشر يثبت التقدم</text>

  <g filter="url(#shadow)"><rect x="625" y="575" width="350" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="800" cy="555" r="38" fill="#0f2d5d"/>
  <text x="800" y="565" class="kr" text-anchor="middle">KR2</text>
  <text x="800" y="635" class="h" text-anchor="middle">نتيجة رئيسية</text>
  <line x1="705" y1="660" x2="895" y2="660" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="800" y="705" class="p" text-anchor="middle">مستهدف قابل للقياس</text>

  <g filter="url(#shadow)"><rect x="1125" y="575" width="350" height="165" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1300" cy="555" r="38" fill="#0f2d5d"/>
  <text x="1300" y="565" class="kr" text-anchor="middle">KR3</text>
  <text x="1300" y="635" class="h" text-anchor="middle">نتيجة رئيسية</text>
  <line x1="1205" y1="660" x2="1395" y2="660" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1300" y="705" class="p" text-anchor="middle">دليل على تحقق الهدف</text>

  <g filter="url(#shadow)">
    <rect x="420" y="805" width="760" height="60" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="844" class="h" text-anchor="middle">الهدف يحدد الاتجاه، والنتائج الرئيسية تثبت التقدم</text>
</svg>