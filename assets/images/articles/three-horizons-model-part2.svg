<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="الآفاق الثلاث الجزء الثاني">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 56px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 21px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .axis{font:700 23px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">الآفاق الثلاث — الجزء الثاني</text>
  <text x="800" y="156" class="sub" text-anchor="middle">جيوب المستقبل والابتكار المزعزع ومساحة التحول</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g transform="translate(170,250)">
    <line x1="0" y1="470" x2="1200" y2="470" stroke="#9aa9bb" stroke-width="3"/>
    <line x1="0" y1="470" x2="0" y2="30" stroke="#9aa9bb" stroke-width="3"/>
    <text x="600" y="535" class="axis" text-anchor="middle">الزمن</text>

    <path d="M20 110 C270 145, 440 250, 610 345 C800 440, 1000 460, 1160 468"
          fill="none" stroke="#0f2d5d" stroke-width="12" stroke-linecap="round"/>
    <path d="M110 430 C310 390, 465 235, 630 205 C795 175, 960 220, 1100 380"
          fill="none" stroke="#d4a63a" stroke-width="12" stroke-linecap="round"/>
    <path d="M85 455 C340 430, 520 355, 715 235 C875 140, 1035 92, 1160 70"
          fill="none" stroke="#43a875" stroke-width="12" stroke-linecap="round"/>

    <g filter="url(#shadow)"><rect x="40" y="55" width="280" height="110" rx="24" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
    <text x="180" y="100" class="h" text-anchor="middle">H1</text>
    <text x="180" y="138" class="p" text-anchor="middle">Business as Usual</text>

    <g filter="url(#shadow)"><rect x="480" y="130" width="320" height="125" rx="24" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
    <text x="640" y="178" class="h" text-anchor="middle">H2</text>
    <text x="640" y="218" class="p" text-anchor="middle">مساحة التحول والتجريب</text>

    <g filter="url(#shadow)"><rect x="865" y="60" width="300" height="115" rx="24" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
    <text x="1015" y="108" class="h" text-anchor="middle">H3</text>
    <text x="1015" y="146" class="p" text-anchor="middle">Emerging Future</text>

    <g>
      <circle cx="910" cy="305" r="28" fill="#43a875"/>
      <circle cx="970" cy="275" r="18" fill="#43a875" opacity=".8"/>
      <circle cx="1045" cy="235" r="24" fill="#43a875" opacity=".9"/>
      <text x="1010" y="345" class="h" text-anchor="middle">جيوب المستقبل</text>
    </g>

    <g>
      <rect x="470" y="330" width="340" height="85" rx="22" fill="#0f2d5d" opacity=".96"/>
      <text x="640" y="382" class="white" text-anchor="middle">Disruptive Innovation</text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="815" width="880" height="54" rx="27" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="850" class="h" text-anchor="middle">جيوب المستقبل الصغيرة قد تصبح مسارًا جديدًا إذا أُدير التحول بوعي</text>
</svg>