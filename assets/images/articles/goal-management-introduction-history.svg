<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="تطور إدارة الأهداف من MBO إلى OKRs">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 42px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 25px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .year{font:700 25px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#d4a63a}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">إدارة الأهداف وقياس الأداء</text>
  <text x="800" y="156" class="sub" text-anchor="middle">من الإدارة بالأهداف إلى النتائج الرئيسية</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="520" y="245" width="560" height="175" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="320" class="white" text-anchor="middle">Goal Management</text>
  <text x="800" y="373" class="white2" text-anchor="middle">أهداف واضحة • مؤشرات • نتائج • متابعة</text>

  <path d="M235 590 H1365" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1345 570 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="110" y="500" width="280" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="250" y="555" class="year" text-anchor="middle">1954</text>
  <text x="250" y="600" class="h" text-anchor="middle">MBO</text>
  <text x="250" y="640" class="p" text-anchor="middle">الإدارة بالأهداف</text>

  <g filter="url(#shadow)"><rect x="460" y="500" width="280" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="600" y="555" class="year" text-anchor="middle">1981</text>
  <text x="600" y="600" class="h" text-anchor="middle">SMART</text>
  <text x="600" y="640" class="p" text-anchor="middle">أهداف قابلة للقياس</text>

  <g filter="url(#shadow)"><rect x="810" y="500" width="280" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="950" y="555" class="year" text-anchor="middle">1992</text>
  <text x="950" y="600" class="h" text-anchor="middle">BSC</text>
  <text x="950" y="640" class="p" text-anchor="middle">بطاقة الأداء المتوازن</text>

  <g filter="url(#shadow)"><rect x="1160" y="500" width="280" height="170" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1300" y="555" class="year" text-anchor="middle">1983+</text>
  <text x="1300" y="600" class="h" text-anchor="middle">OKRs</text>
  <text x="1300" y="640" class="p" text-anchor="middle">أهداف ونتائج رئيسية</text>

  <g filter="url(#shadow)">
    <rect x="420" y="760" width="760" height="82" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="812" class="h" text-anchor="middle">القيمة ليست في كتابة الهدف، بل في تحويله إلى نتيجة قابلة للمتابعة</text>
</svg>