<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="منهجيات إدارة المشاريع واختيار المنهجية المناسبة">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 21px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 43px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 23px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">منهجيات إدارة المشاريع</text>
  <text x="800" y="156" class="sub" text-anchor="middle">لا توجد منهجية أفضل دائمًا، بل منهجية أنسب للسياق</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="535" y="260" width="530" height="250" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="345" class="white" text-anchor="middle">اختيار المنهجية</text>
  <text x="800" y="405" class="white2" text-anchor="middle">إطار عمل لإدارة المشروع بأفضل طريقة ممكنة</text>
  <rect x="620" y="435" width="360" height="55" rx="28" fill="#edbf56"/>
  <text x="800" y="472" class="pill" text-anchor="middle">المشروع أولًا، ثم المنهجية</text>

  <g filter="url(#shadow)"><rect x="80" y="290" width="330" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="245" y="345" class="h" text-anchor="middle">عوامل المشروع</text>
  <line x1="155" y1="368" x2="335" y2="368" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="245" y="407" class="p" text-anchor="middle">بساطة أو تعقيد</text>

  <g filter="url(#shadow)"><rect x="80" y="475" width="330" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="245" y="530" class="h" text-anchor="middle">المرونة</text>
  <line x1="155" y1="553" x2="335" y2="553" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="245" y="592" class="p" text-anchor="middle">ثبات أم تغير في النطاق</text>

  <g filter="url(#shadow)"><rect x="80" y="660" width="330" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="245" y="715" class="h" text-anchor="middle">المخاطر</text>
  <line x1="155" y1="738" x2="335" y2="738" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="245" y="777" class="p" text-anchor="middle">درجة التحمل والسيطرة</text>

  <g filter="url(#shadow)"><rect x="1190" y="290" width="330" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1355" y="345" class="h" text-anchor="middle">العميل وأصحاب المصلحة</text>
  <line x1="1235" y1="368" x2="1475" y2="368" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1355" y="407" class="p" text-anchor="middle">حاجة المشاركة ورغبتها</text>

  <g filter="url(#shadow)"><rect x="1190" y="475" width="330" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1355" y="530" class="h" text-anchor="middle">القيمة والأهداف</text>
  <line x1="1245" y1="553" x2="1465" y2="553" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1355" y="592" class="p" text-anchor="middle">ما الذي يخدم النتائج؟</text>

  <g filter="url(#shadow)"><rect x="1190" y="660" width="330" height="135" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1355" y="715" class="h" text-anchor="middle">ثقافة الفريق</text>
  <line x1="1245" y1="738" x2="1465" y2="738" stroke="#5fa0d9" stroke-width="4" stroke-linecap="round"/>
  <text x="1355" y="777" class="p" text-anchor="middle">عادات وقيم وقبول</text>

  <line x1="410" y1="358" x2="535" y2="380" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="410" y1="543" x2="535" y2="430" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="410" y1="728" x2="620" y2="510" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1065" y1="380" x2="1190" y2="358" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1065" y1="430" x2="1190" y2="543" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="980" y1="510" x2="1190" y2="728" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>