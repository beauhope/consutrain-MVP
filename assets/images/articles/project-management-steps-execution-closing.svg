<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="خطوات إدارة المشروع: التنفيذ والإغلاق">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 44px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .num{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>
  <text x="800" y="96" class="title" text-anchor="middle">خطوات إدارة المشروع: من التنفيذ إلى الإغلاق</text>
  <text x="800" y="156" class="sub" text-anchor="middle">تحويل الخطة إلى عمل ثم تحويل التجربة إلى دروس مستفادة</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="170" y="285" width="560" height="395" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/></g>
  <circle cx="450" cy="260" r="40" fill="#0f2d5d" stroke="#e2b653" stroke-width="5"/>
  <text x="450" y="272" class="num" text-anchor="middle">3</text>
  <text x="450" y="360" class="white" text-anchor="middle">التنفيذ</text>
  <text x="450" y="420" class="white2" text-anchor="middle">جمع الفريق وتوزيع العمل والمتابعة</text>
  <rect x="250" y="470" width="400" height="54" rx="27" fill="#edbf56"/>
  <text x="450" y="506" class="h" text-anchor="middle">تقدم الأعمال وإدارة المشكلات</text>
  <text x="450" y="575" class="white2" text-anchor="middle">تقارير • اجتماعات • ميزانية • قرارات</text>

  <g filter="url(#shadow)"><rect x="870" y="285" width="560" height="395" rx="42" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1150" cy="260" r="40" fill="#0f2d5d" stroke="#e2b653" stroke-width="5"/>
  <text x="1150" y="272" class="num" text-anchor="middle">4</text>
  <text x="1150" y="360" class="h" text-anchor="middle">الإغلاق</text>
  <line x1="1000" y1="390" x2="1300" y2="390" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <text x="1150" y="450" class="p" text-anchor="middle">تقييم أداء المشروع</text>
  <text x="1150" y="505" class="p" text-anchor="middle">تسليم الوثائق والمخرجات</text>
  <text x="1150" y="560" class="p" text-anchor="middle">استخلاص الدروس المستفادة</text>

  <path d="M750 480 H850" stroke="#d5a033" stroke-width="8" stroke-linecap="round"/>
  <path d="M828 457 l38 23 l-38 23" fill="none" stroke="#d5a033" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="415" y="735" width="770" height="90" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="792" class="h" text-anchor="middle">المشروع لا ينتهي بالتسليم فقط، بل بالتقييم والتعلم والتحسين</text>
</svg>