<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="مبادئ التنظيم الإداري وتصنيفاته">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff9ef"/>
    </linearGradient>
    <linearGradient id="center" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2f64"/><stop offset="100%" stop-color="#1c5d8f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0b2a55" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#0f2d5d;}
      .sub{font:400 32px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#60718a;}
      .h{font:700 34px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#0f2d5d;}
      .body{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#475b73;}
      .centerTitle{font:700 52px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#fff;}
      .centerBody{font:400 28px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#fff;}
      .pill{font:700 26px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#0f2d5d;}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1450" cy="92" r="135" fill="#efe3cf" opacity=".62"/>
  <circle cx="105" cy="810" r="130" fill="#dceafa" opacity=".75"/>
  <circle cx="255" cy="150" r="52" fill="#dfeaf6" opacity=".85"/>
  <circle cx="1320" cy="760" r="3.5" fill="#d2deef"/><circle cx="1345" cy="760" r="3.5" fill="#d2deef"/><circle cx="1370" cy="760" r="3.5" fill="#d2deef"/><circle cx="1395" cy="760" r="3.5" fill="#d2deef"/>
  <circle cx="1320" cy="785" r="3.5" fill="#d2deef"/><circle cx="1345" cy="785" r="3.5" fill="#d2deef"/><circle cx="1370" cy="785" r="3.5" fill="#d2deef"/><circle cx="1395" cy="785" r="3.5" fill="#d2deef"/>

  <text x="800" y="95" text-anchor="middle" class="title">مبادئ التنظيم الإداري</text>
  <text x="800" y="160" text-anchor="middle" class="sub">من توزيع المهام إلى وضوح المسؤوليات</text>
  <line x1="640" y1="194" x2="760" y2="194" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="194" r="6" fill="#d9a933"/>
  <line x1="840" y1="194" x2="960" y2="194" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <!-- center -->
  <g filter="url(#shadow)"><rect x="560" y="260" width="480" height="300" rx="38" fill="url(#center)" stroke="#e4b34c" stroke-width="4"/></g>
  <text x="800" y="365" text-anchor="middle" class="centerTitle">تنظيم فعّال</text>
  <text x="800" y="425" text-anchor="middle" class="centerBody">أدوار واضحة • صلاحيات مناسبة</text>
  <rect x="625" y="465" width="350" height="58" rx="29" fill="#edbf56"/>
  <text x="800" y="504" text-anchor="middle" class="pill">عمل أقل تداخلاً وأكثر تنسيقًا</text>

  <!-- connectors -->
  <line x1="520" y1="410" x2="560" y2="410" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1040" y1="410" x2="1080" y2="410" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="800" y1="560" x2="800" y2="625" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <circle cx="520" cy="410" r="14" fill="#fff" stroke="#d5a033" stroke-width="6"/><circle cx="1080" cy="410" r="14" fill="#fff" stroke="#d5a033" stroke-width="6"/><circle cx="800" cy="625" r="14" fill="#fff" stroke="#d5a033" stroke-width="6"/>

  <!-- left card -->
  <g filter="url(#shadow)"><rect x="80" y="305" width="430" height="220" rx="28" fill="#fff" stroke="#bdd7ef" stroke-width="2"/></g>
  <circle cx="160" cy="415" r="50" fill="#edf5fe" stroke="#b6d1ec" stroke-width="5"/>
  <g stroke="#173d74" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M140 402 h42 M140 425 h42 M140 448 h42"/><path d="M125 403 l8 8 14-18 M125 426 l8 8 14-18 M125 449 l8 8 14-18"/></g>
  <text x="305" y="380" text-anchor="middle" class="h">وضوح المسؤولية</text>
  <line x1="210" y1="405" x2="405" y2="405" stroke="#5fa0d9" stroke-width="4" stroke-linecap="round"/>
  <text x="305" y="460" text-anchor="middle" class="body">من يفعل ماذا؟</text>
  <text x="305" y="500" text-anchor="middle" class="body">ومن يتحمل النتيجة؟</text>

  <!-- right card -->
  <g filter="url(#shadow)"><rect x="1090" y="305" width="430" height="220" rx="28" fill="#fff" stroke="#bdd7ef" stroke-width="2"/></g>
  <circle cx="1435" cy="415" r="50" fill="#fff4e3" stroke="#e7c77c" stroke-width="5"/>
  <g stroke="#9a6c10" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M1415 435 h40"/><path d="M1420 425 l15-28 15 28"/><circle cx="1435" cy="392" r="11"/></g>
  <text x="1275" y="380" text-anchor="middle" class="h">سلطة ومسؤولية</text>
  <line x1="1170" y1="405" x2="1370" y2="405" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1275" y="460" text-anchor="middle" class="body">صلاحيات مناسبة</text>
  <text x="1275" y="500" text-anchor="middle" class="body">ومساءلة واضحة</text>

  <!-- bottom card -->
  <g filter="url(#shadow)"><rect x="450" y="640" width="700" height="205" rx="28" fill="#fff" stroke="#bdd7ef" stroke-width="2"/></g>
  <circle cx="535" cy="742" r="54" fill="#eaf7ee" stroke="#c5dec5" stroke-width="5"/>
  <g stroke="#3f8d53" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M510 742 q25-40 50 0 q-25 38-50 0z"/><path d="M535 702 v22 M535 760 v25 M492 742 h22 M556 742 h22"/></g>
  <text x="800" y="715" text-anchor="middle" class="h">تفويض وتنسيق</text>
  <line x1="610" y1="740" x2="990" y2="740" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="800" y="795" text-anchor="middle" class="body">نقل الصلاحية بحدود واضحة، وربط الجهود بين الفرق</text>
  <text x="800" y="832" text-anchor="middle" class="body">حتى لا يعمل كل قسم بمعزل عن الآخر</text>
</svg>