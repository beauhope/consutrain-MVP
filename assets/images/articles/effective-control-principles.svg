<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="مبادئ الرقابة الفعالة">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 29px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 23px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 47px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">مبادئ الرقابة الفعالة</text>
  <text x="800" y="156" class="sub" text-anchor="middle">رقابة عادلة ومبكرة ومبنية على بيانات</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="545" y="285" width="510" height="250" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M720 390 l55 55 l110-130"/>
    <circle cx="800" cy="390" r="92"/>
  </g>
  <text x="800" y="610" class="white" text-anchor="middle">رقابة فعالة</text>
  <text x="800" y="665" class="white2" text-anchor="middle">تحسين الأداء دون تعطيل العمل</text>
  <rect x="615" y="692" width="370" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="729" class="pill" text-anchor="middle">ثقة • شفافية • تصحيح</text>

  <g filter="url(#shadow)"><rect x="90" y="295" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="350" class="h" text-anchor="middle">وضوح المعايير</text>
  <line x1="165" y1="373" x2="365" y2="373" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="420" class="p" text-anchor="middle">ما الذي نقيسه؟ ولماذا؟</text>

  <g filter="url(#shadow)"><rect x="1160" y="295" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="350" class="h" text-anchor="middle">توقيت مناسب</text>
  <line x1="1235" y1="373" x2="1435" y2="373" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="420" class="p" text-anchor="middle">تصحيح قبل تضخم المشكلة</text>

  <g filter="url(#shadow)"><rect x="90" y="610" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="665" class="h" text-anchor="middle">عدالة وموضوعية</text>
  <line x1="165" y1="688" x2="365" y2="688" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="735" class="p" text-anchor="middle">معايير لا انطباعات</text>

  <g filter="url(#shadow)"><rect x="1160" y="610" width="350" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="665" class="h" text-anchor="middle">تركيز على التصحيح</text>
  <line x1="1235" y1="688" x2="1435" y2="688" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="735" class="p" text-anchor="middle">معالجة السبب لا اللوم</text>

  <line x1="440" y1="372" x2="545" y2="382" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1055" y1="382" x2="1160" y2="372" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="440" y1="688" x2="615" y2="535" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1160" y1="688" x2="985" y2="535" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>