<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="طريقة Kanban ولوحة Kanban">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 23px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .head{font:700 32px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .card{font:700 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">منهجية Kanban</text>
  <text x="800" y="156" class="sub" text-anchor="middle">إدارة تدفق العمل بصريًا من الفكرة إلى الإنجاز</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="165" y="250" width="1270" height="510" rx="38" fill="#ffffff" stroke="#c4d9ee" stroke-width="3"/>
  </g>

  <rect x="205" y="290" width="360" height="78" rx="22" fill="#0f2d5d"/>
  <rect x="620" y="290" width="360" height="78" rx="22" fill="#0f2d5d"/>
  <rect x="1035" y="290" width="360" height="78" rx="22" fill="#0f2d5d"/>
  <text x="385" y="340" class="head" text-anchor="middle">To Do</text>
  <text x="800" y="340" class="head" text-anchor="middle">Doing</text>
  <text x="1215" y="340" class="head" text-anchor="middle">Done</text>

  <line x1="595" y1="285" x2="595" y2="730" stroke="#d8e5f3" stroke-width="4"/>
  <line x1="1010" y1="285" x2="1010" y2="730" stroke="#d8e5f3" stroke-width="4"/>

  <g filter="url(#shadow)">
    <rect x="245" y="410" width="280" height="74" rx="18" fill="#fff4df" stroke="#d6a843" stroke-width="2"/>
    <rect x="245" y="515" width="280" height="74" rx="18" fill="#edf5fe" stroke="#6fa7d9" stroke-width="2"/>
    <rect x="660" y="410" width="280" height="74" rx="18" fill="#edf8ef" stroke="#7ab987" stroke-width="2"/>
    <rect x="660" y="515" width="280" height="74" rx="18" fill="#fff4df" stroke="#d6a843" stroke-width="2"/>
    <rect x="1075" y="410" width="280" height="74" rx="18" fill="#edf8ef" stroke="#7ab987" stroke-width="2"/>
    <rect x="1075" y="515" width="280" height="74" rx="18" fill="#edf8ef" stroke="#7ab987" stroke-width="2"/>
  </g>
  <text x="385" y="456" class="card" text-anchor="middle">مهمة جديدة</text>
  <text x="385" y="561" class="card" text-anchor="middle">فكرة / طلب</text>
  <text x="800" y="456" class="card" text-anchor="middle">قيد التنفيذ</text>
  <text x="800" y="561" class="card" text-anchor="middle">قيد المراجعة</text>
  <text x="1215" y="456" class="card" text-anchor="middle">منجز</text>
  <text x="1215" y="561" class="card" text-anchor="middle">معتمد</text>

  <path d="M530 447 H650" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <path d="M930 447 H1070" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <path d="M635 429 l28 18 l-28 18" fill="none" stroke="#d5a033" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M1055 429 l28 18 l-28 18" fill="none" stroke="#d5a033" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="430" y="790" width="740" height="70" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="835" class="h" text-anchor="middle">اجعل العمل مرئيًا، قلل العمل الجاري، وحسّن التدفق باستمرار</text>
</svg>