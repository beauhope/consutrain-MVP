<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="أنواع الهياكل التنظيمية">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1e668f"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 31px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 44px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1450" cy="110" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="790" r="145" fill="#dce9f7" opacity=".7"/>
  <circle cx="300" cy="150" r="52" fill="#dce9f7" opacity=".75"/>
  <text x="800" y="95" class="title" text-anchor="middle">أنواع الهياكل التنظيمية</text>
  <text x="800" y="155" class="sub" text-anchor="middle">اختيار الشكل المناسب حسب طبيعة العمل وحجم المؤسسة</text>
  <line x1="640" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/><circle cx="800" cy="190" r="6" fill="#d9a933"/><line x1="840" y1="190" x2="960" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="510" y="250" width="580" height="210" rx="40" fill="url(#main)" stroke="#e2b653" stroke-width="4"/></g>
  <text x="800" y="325" class="white" text-anchor="middle">الهيكل التنظيمي</text>
  <text x="800" y="382" class="white2" text-anchor="middle">يوضح كيف تتوزع الأدوار والصلاحيات</text>
  <rect x="620" y="405" width="360" height="50" rx="25" fill="#edbf56"/>
  <text x="800" y="438" style="font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d" text-anchor="middle">لا يوجد نوع واحد يناسب الجميع</text>

  <!-- cards row 1 -->
  <g filter="url(#shadow)"><rect x="85" y="520" width="280" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="225" y="582" class="h" text-anchor="middle">وظيفي</text>
  <line x1="140" y1="606" x2="310" y2="606" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="225" y="650" class="p" text-anchor="middle">حسب الإدارات</text>
  <text x="225" y="686" class="p" text-anchor="middle">والتخصصات</text>

  <g filter="url(#shadow)"><rect x="395" y="520" width="280" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="535" y="582" class="h" text-anchor="middle">حسب المنتج</text>
  <line x1="450" y1="606" x2="620" y2="606" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="535" y="650" class="p" text-anchor="middle">كل منتج له</text>
  <text x="535" y="686" class="p" text-anchor="middle">وحدة مسؤولة</text>

  <g filter="url(#shadow)"><rect x="705" y="520" width="280" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="845" y="582" class="h" text-anchor="middle">جغرافي</text>
  <line x1="760" y1="606" x2="930" y2="606" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="845" y="650" class="p" text-anchor="middle">حسب المناطق</text>
  <text x="845" y="686" class="p" text-anchor="middle">أو الفروع</text>

  <g filter="url(#shadow)"><rect x="1015" y="520" width="280" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1155" y="582" class="h" text-anchor="middle">مصفوفي</text>
  <line x1="1070" y1="606" x2="1240" y2="606" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="1155" y="650" class="p" text-anchor="middle">وظائف ومشاريع</text>
  <text x="1155" y="686" class="p" text-anchor="middle">في وقت واحد</text>

  <g filter="url(#shadow)"><rect x="1325" y="520" width="190" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1420" y="582" class="h" text-anchor="middle">مشروعي</text>
  <line x1="1360" y1="606" x2="1480" y2="606" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1420" y="650" class="p" text-anchor="middle">فرق حول</text>
  <text x="1420" y="686" class="p" text-anchor="middle">المشاريع</text>

  <!-- connectors -->
  <line x1="800" y1="460" x2="800" y2="495" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <path d="M225 495 H1420" fill="none" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="225" y1="495" x2="225" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="535" y1="495" x2="535" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="845" y1="495" x2="845" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1155" y1="495" x2="1155" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1420" y1="495" x2="1420" y2="520" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <circle cx="800" cy="495" r="12" fill="#fff" stroke="#d5a033" stroke-width="5"/>
</svg>