<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="اتخاذ القرار بأسلوب DECIDE">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 25px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 20px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 48px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .letter{font:700 32px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">اتخاذ القرار بطريقة عملية</text>
  <text x="800" y="156" class="sub" text-anchor="middle">أسلوب DECIDE من تحديد المشكلة إلى تقييم الحل</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="540" y="250" width="520" height="205" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="335" class="white" text-anchor="middle">DECIDE</text>
  <text x="800" y="392" class="white2" text-anchor="middle">قرار مبني على مشكلة ومعايير وبدائل</text>

  <path d="M180 580 H1420" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1400 560 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="60" y="520" width="220" height="165" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="170" cy="500" r="34" fill="#0f2d5d"/><text x="170" y="511" class="letter" text-anchor="middle">D</text>
  <text x="170" y="575" class="h" text-anchor="middle">حدد المشكلة</text>
  <line x1="115" y1="598" x2="225" y2="598" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="170" y="642" class="p" text-anchor="middle">السبب لا العرض</text>

  <g filter="url(#shadow)"><rect x="305" y="520" width="220" height="165" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="415" cy="500" r="34" fill="#0f2d5d"/><text x="415" y="511" class="letter" text-anchor="middle">E</text>
  <text x="415" y="575" class="h" text-anchor="middle">ضع المعايير</text>
  <line x1="360" y1="598" x2="470" y2="598" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="415" y="642" class="p" text-anchor="middle">ما المهم؟</text>

  <g filter="url(#shadow)"><rect x="550" y="520" width="220" height="165" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="660" cy="500" r="34" fill="#0f2d5d"/><text x="660" y="511" class="letter" text-anchor="middle">C</text>
  <text x="660" y="575" class="h" text-anchor="middle">ادرس البدائل</text>
  <line x1="605" y1="598" x2="715" y2="598" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="660" y="642" class="p" text-anchor="middle">خيارات متعددة</text>

  <g filter="url(#shadow)"><rect x="795" y="520" width="220" height="165" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="905" cy="500" r="34" fill="#0f2d5d"/><text x="905" y="511" class="letter" text-anchor="middle">I</text>
  <text x="905" y="575" class="h" text-anchor="middle">اختر الأفضل</text>
  <line x1="850" y1="598" x2="960" y2="598" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="905" y="642" class="p" text-anchor="middle">مقارنة ووزن</text>

  <g filter="url(#shadow)"><rect x="1040" y="520" width="220" height="165" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1150" cy="500" r="34" fill="#0f2d5d"/><text x="1150" y="511" class="letter" text-anchor="middle">D</text>
  <text x="1150" y="575" class="h" text-anchor="middle">نفذ الخطة</text>
  <line x1="1095" y1="598" x2="1205" y2="598" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1150" y="642" class="p" text-anchor="middle">مسؤوليات وموارد</text>

  <g filter="url(#shadow)"><rect x="1285" y="520" width="240" height="165" rx="25" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1405" cy="500" r="34" fill="#0f2d5d"/><text x="1405" y="511" class="letter" text-anchor="middle">E</text>
  <text x="1405" y="575" class="h" text-anchor="middle">قيّم الحل</text>
  <line x1="1345" y1="598" x2="1465" y2="598" stroke="#5fa0d9" stroke-width="4" stroke-linecap="round"/>
  <text x="1405" y="642" class="p" text-anchor="middle">هل حل المشكلة؟</text>

  <g filter="url(#shadow)">
    <rect x="450" y="745" width="700" height="90" rx="30" fill="#0f2d5d" stroke="#e2b653" stroke-width="3"/>
  </g>
  <text x="800" y="802" style="font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff" text-anchor="middle">القرار الجيد ليس مثاليًا دائمًا، لكنه منظم ومبني على تحليل</text>
</svg>