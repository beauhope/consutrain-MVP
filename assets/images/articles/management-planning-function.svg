<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="وظيفة التخطيط في الإدارة">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#fff9ef"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f2d5d"/>
      <stop offset="100%" stop-color="#174c82"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#17345f" flood-opacity="0.16"/>
    </filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#0f2d5d;}
      .subtitle{font:400 32px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#607189;}
      .step-title{font:700 30px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#0f2d5d;}
      .step-body{font:400 23px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#43546b;}
      .center-title{font:700 56px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#ffffff;}
      .center-body{font:400 28px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#ffffff;}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif; fill:#0f2d5d;}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d9a933"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1485" cy="85" r="135" fill="#efe3cf" opacity="0.65"/>
  <circle cx="110" cy="815" r="145" fill="#dce9f8" opacity="0.72"/>
  <circle cx="260" cy="150" r="48" fill="#e7f0fb"/>
  <circle cx="1360" cy="760" r="40" fill="#f4e9d9"/>
  <g opacity="0.6" fill="#d6e2f0">
    <circle cx="86" cy="92" r="4"/><circle cx="106" cy="92" r="4"/><circle cx="126" cy="92" r="4"/><circle cx="146" cy="92" r="4"/>
    <circle cx="86" cy="112" r="4"/><circle cx="106" cy="112" r="4"/><circle cx="126" cy="112" r="4"/><circle cx="146" cy="112" r="4"/>
    <circle cx="1290" cy="835" r="4"/><circle cx="1310" cy="835" r="4"/><circle cx="1330" cy="835" r="4"/><circle cx="1350" cy="835" r="4"/>
    <circle cx="1290" cy="855" r="4"/><circle cx="1310" cy="855" r="4"/><circle cx="1330" cy="855" r="4"/><circle cx="1350" cy="855" r="4"/>
  </g>

  <text x="800" y="100" class="title" text-anchor="middle">وظيفة التخطيط في الإدارة</text>
  <text x="800" y="168" class="subtitle" text-anchor="middle">من الهدف إلى مسار عمل قابل للتنفيذ والقياس</text>
  <line x1="620" y1="200" x2="760" y2="200" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="200" r="6" fill="#d9a933"/>
  <line x1="840" y1="200" x2="980" y2="200" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <!-- center hub -->
  <g filter="url(#softShadow)">
    <rect x="560" y="300" width="480" height="300" rx="38" fill="url(#navy)" stroke="#d9a933" stroke-width="4"/>
  </g>
  <g stroke="#f0c45d" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M725 382 h150 v95 h-150z"/>
    <path d="M750 418 h90 M750 452 h55"/>
    <path d="M880 398 l32 -32 l24 24 l-32 32z"/>
    <path d="M720 515 q80 55 160 0"/>
  </g>
  <text x="800" y="505" class="center-title" text-anchor="middle">التخطيط</text>
  <text x="800" y="557" class="center-body" text-anchor="middle">ماذا؟ كيف؟ متى؟ ومن المسؤول؟</text>
  <rect x="628" y="590" width="344" height="58" rx="29" fill="#efc45c" filter="url(#softShadow)"/>
  <text x="800" y="629" class="pill" text-anchor="middle">قرارات مسبقة لتنفيذ أفضل</text>

  <!-- steps cards -->
  <g filter="url(#softShadow)">
    <rect x="80" y="275" width="360" height="165" rx="28" fill="#ffffff" stroke="#c4d9ef" stroke-width="2"/>
  </g>
  <circle cx="390" cy="325" r="34" fill="#e7f0fb" stroke="#aac9e8" stroke-width="4"/>
  <text x="390" y="336" font-family="Segoe UI, Tahoma, Arial" font-size="28" font-weight="700" fill="#174c82" text-anchor="middle">1</text>
  <text x="245" y="330" class="step-title" text-anchor="middle">تحديد الهدف</text>
  <text x="245" y="380" class="step-body" text-anchor="middle">ما النتيجة المطلوبة؟</text>
  <text x="245" y="415" class="step-body" text-anchor="middle">وما الأولوية؟</text>

  <g filter="url(#softShadow)">
    <rect x="1160" y="275" width="360" height="165" rx="28" fill="#ffffff" stroke="#e4cf94" stroke-width="2"/>
  </g>
  <circle cx="1210" cy="325" r="34" fill="#fff2d8" stroke="#e5c36e" stroke-width="4"/>
  <text x="1210" y="336" font-family="Segoe UI, Tahoma, Arial" font-size="28" font-weight="700" fill="#8c650f" text-anchor="middle">2</text>
  <text x="1340" y="330" class="step-title" text-anchor="middle">دراسة البدائل</text>
  <text x="1340" y="380" class="step-body" text-anchor="middle">ما الخيارات المتاحة؟</text>
  <text x="1340" y="415" class="step-body" text-anchor="middle">وما الأنسب للموارد؟</text>

  <g filter="url(#softShadow)">
    <rect x="90" y="610" width="410" height="165" rx="28" fill="#ffffff" stroke="#d7e5d4" stroke-width="2"/>
  </g>
  <circle cx="445" cy="660" r="34" fill="#ecf7e9" stroke="#b9d9b2" stroke-width="4"/>
  <text x="445" y="671" font-family="Segoe UI, Tahoma, Arial" font-size="28" font-weight="700" fill="#3f8c50" text-anchor="middle">3</text>
  <text x="285" y="665" class="step-title" text-anchor="middle">تخصيص الموارد</text>
  <text x="285" y="715" class="step-body" text-anchor="middle">من سينفذ؟ وما الموارد</text>
  <text x="285" y="750" class="step-body" text-anchor="middle">والوقت المطلوب؟</text>

  <g filter="url(#softShadow)">
    <rect x="1100" y="610" width="410" height="165" rx="28" fill="#ffffff" stroke="#e5d5dc" stroke-width="2"/>
  </g>
  <circle cx="1155" cy="660" r="34" fill="#f7e9ef" stroke="#deb9ca" stroke-width="4"/>
  <text x="1155" y="671" font-family="Segoe UI, Tahoma, Arial" font-size="28" font-weight="700" fill="#9a4770" text-anchor="middle">4</text>
  <text x="1305" y="665" class="step-title" text-anchor="middle">المتابعة والقياس</text>
  <text x="1305" y="715" class="step-body" text-anchor="middle">كيف نعرف أن التنفيذ</text>
  <text x="1305" y="750" class="step-body" text-anchor="middle">يسير في المسار الصحيح؟</text>

  <!-- connectors -->
  <line x1="440" y1="360" x2="560" y2="405" stroke="#d9a933" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="1160" y1="360" x2="1040" y2="405" stroke="#d9a933" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="500" y1="665" x2="580" y2="585" stroke="#d9a933" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="1100" y1="665" x2="1020" y2="585" stroke="#d9a933" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <text x="800" y="820" font-family="Segoe UI, Tahoma, Arial, sans-serif" font-size="28" font-weight="600" fill="#607189" text-anchor="middle">التخطيط الجيد يربط الأهداف بالموارد والمسؤوليات ومؤشرات المتابعة</text>
</svg>
