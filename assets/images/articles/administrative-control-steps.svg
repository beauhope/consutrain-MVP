<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="خطوات الرقابة الإدارية">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 44px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .num{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">خطوات الرقابة الإدارية</text>
  <text x="800" y="156" class="sub" text-anchor="middle">من تحديد المعيار إلى الإجراء التصحيحي ومتابعة الأثر</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="520" y="245" width="560" height="170" rx="40" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="330" class="white" text-anchor="middle">عملية رقابية متكاملة</text>
  <text x="800" y="382" style="font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff" text-anchor="middle">قياس وفهم وتصحيح لا مجرد تقارير</text>

  <path d="M260 560 H1340" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M1320 540 l35 20 l-35 20" fill="none" stroke="#d5a033" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)"><rect x="80" y="480" width="220" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="190" cy="455" r="34" fill="#0f2d5d"/><text x="190" y="465" class="num" text-anchor="middle">1</text>
  <text x="190" y="540" class="h" text-anchor="middle">تحديد المعايير</text>
  <line x1="125" y1="562" x2="255" y2="562" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="190" y="610" class="p" text-anchor="middle">أهداف ومؤشرات</text>

  <g filter="url(#shadow)"><rect x="335" y="480" width="220" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="445" cy="455" r="34" fill="#0f2d5d"/><text x="445" y="465" class="num" text-anchor="middle">2</text>
  <text x="445" y="540" class="h" text-anchor="middle">قياس الأداء</text>
  <line x1="380" y1="562" x2="510" y2="562" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="445" y="610" class="p" text-anchor="middle">بيانات وتقارير</text>

  <g filter="url(#shadow)"><rect x="590" y="480" width="220" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="700" cy="455" r="34" fill="#0f2d5d"/><text x="700" y="465" class="num" text-anchor="middle">3</text>
  <text x="700" y="540" class="h" text-anchor="middle">المقارنة</text>
  <line x1="635" y1="562" x2="765" y2="562" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="700" y="610" class="p" text-anchor="middle">فعلي مقابل مستهدف</text>

  <g filter="url(#shadow)"><rect x="845" y="480" width="220" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="955" cy="455" r="34" fill="#0f2d5d"/><text x="955" y="465" class="num" text-anchor="middle">4</text>
  <text x="955" y="540" class="h" text-anchor="middle">تحليل الانحراف</text>
  <line x1="890" y1="562" x2="1020" y2="562" stroke="#b08fe2" stroke-width="4" stroke-linecap="round"/>
  <text x="955" y="610" class="p" text-anchor="middle">سبب وأثر</text>

  <g filter="url(#shadow)"><rect x="1100" y="480" width="220" height="185" rx="26" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <circle cx="1210" cy="455" r="34" fill="#0f2d5d"/><text x="1210" y="465" class="num" text-anchor="middle">5</text>
  <text x="1210" y="540" class="h" text-anchor="middle">إجراء تصحيحي</text>
  <line x1="1145" y1="562" x2="1275" y2="562" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1210" y="610" class="p" text-anchor="middle">قرار ومتابعة أثر</text>

  <g filter="url(#shadow)">
    <rect x="515" y="730" width="570" height="86" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="784" style="font:700 31px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d" text-anchor="middle">الهدف: تحسين الأداء لا إنتاج تقارير فقط</text>
</svg>