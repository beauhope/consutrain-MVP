<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="فرق العمل وأنواعها">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 45px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 26px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">ما هي فرق العمل؟</text>
  <text x="800" y="156" class="sub" text-anchor="middle">اختيار الفريق المناسب يبدأ من الهدف والحاجة الفعلية</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="540" y="255" width="520" height="240" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="800" cy="335" r="34"/>
    <circle cx="720" cy="395" r="26"/>
    <circle cx="880" cy="395" r="26"/>
    <path d="M735 455 q65-55 130 0"/>
    <path d="M650 460 q70-45 140 0"/>
    <path d="M810 460 q70-45 140 0"/>
  </g>
  <text x="800" y="570" class="white" text-anchor="middle">فريق العمل</text>
  <text x="800" y="625" class="white2" text-anchor="middle">أشخاص بأدوار مختلفة يعملون لهدف مشترك</text>
  <rect x="620" y="652" width="360" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="689" class="pill" text-anchor="middle">تعاون يضيف قيمة</text>

  <g filter="url(#shadow)"><rect x="90" y="300" width="350" height="145" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="355" class="h" text-anchor="middle">فرق وظيفية</text>
  <line x1="170" y1="378" x2="360" y2="378" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="425" class="p" text-anchor="middle">داخل نفس الإدارة</text>

  <g filter="url(#shadow)"><rect x="1160" y="300" width="350" height="145" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="355" class="h" text-anchor="middle">متعددة الوظائف</text>
  <line x1="1230" y1="378" x2="1440" y2="378" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="425" class="p" text-anchor="middle">خبرات من إدارات مختلفة</text>

  <g filter="url(#shadow)"><rect x="90" y="570" width="350" height="145" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="265" y="625" class="h" text-anchor="middle">فرق حل المشكلات</text>
  <line x1="160" y1="648" x2="370" y2="648" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="265" y="695" class="p" text-anchor="middle">مهمة محددة ووقت محدود</text>

  <g filter="url(#shadow)"><rect x="1160" y="570" width="350" height="145" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1335" y="625" class="h" text-anchor="middle">فرق افتراضية</text>
  <line x1="1230" y1="648" x2="1440" y2="648" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1335" y="695" class="p" text-anchor="middle">تعاون عبر التقنية</text>

  <g filter="url(#shadow)"><rect x="560" y="765" width="480" height="85" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="800" y="818" class="h" text-anchor="middle">اسأل أولًا: هل نحتاج فعلًا إلى فريق؟</text>

  <line x1="440" y1="372" x2="540" y2="372" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1060" y1="372" x2="1160" y2="372" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="440" y1="642" x2="620" y2="495" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1160" y1="642" x2="980" y2="495" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="800" y1="708" x2="800" y2="765" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
</svg>