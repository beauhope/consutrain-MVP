<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="ما هي القيادة الإدارية">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#fff8ee"/>
    </linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f2d5d"/>
      <stop offset="100%" stop-color="#1f6a94"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/>
    </filter>
    <style>
      .title{font:700 62px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 32px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 25px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 48px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1465" cy="100" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="140" cy="795" r="145" fill="#dce9f7" opacity=".7"/>
  <circle cx="295" cy="150" r="52" fill="#dce9f7" opacity=".75"/>

  <text x="800" y="98" class="title" text-anchor="middle">ما هي القيادة الإدارية؟</text>
  <text x="800" y="156" class="sub" text-anchor="middle">تأثير وتوجيه وتحفيز لتحويل الخطط إلى نتائج</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="540" y="255" width="520" height="290" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>

  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="800" cy="330" r="34"/>
    <path d="M720 430 q80-75 160 0"/>
    <path d="M800 365 v65"/>
    <path d="M720 365 q-55 20-85 68"/>
    <path d="M880 365 q55 20 85 68"/>
    <circle cx="635" cy="455" r="22"/>
    <circle cx="965" cy="455" r="22"/>
  </g>

  <text x="800" y="608" class="white" text-anchor="middle">القيادة</text>
  <text x="800" y="665" class="white2" text-anchor="middle">منصب لا يكفي دون تأثير وثقة</text>
  <rect x="620" y="690" width="360" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="727" class="pill" text-anchor="middle">تحريك الفريق نحو الهدف</text>

  <g filter="url(#shadow)"><rect x="90" y="340" width="380" height="190" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="280" y="400" class="h" text-anchor="middle">توجيه واضح</text>
  <line x1="170" y1="424" x2="390" y2="424" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="280" y="474" class="p" text-anchor="middle">شرح الهدف والأولويات</text>
  <text x="280" y="512" class="p" text-anchor="middle">وتقليل الغموض</text>

  <g filter="url(#shadow)"><rect x="1130" y="340" width="380" height="190" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1320" y="400" class="h" text-anchor="middle">تأثير وثقة</text>
  <line x1="1210" y1="424" x2="1430" y2="424" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1320" y="474" class="p" text-anchor="middle">قدوة وعدالة وتواصل</text>
  <text x="1320" y="512" class="p" text-anchor="middle">وليس أوامر فقط</text>

  <g filter="url(#shadow)"><rect x="590" y="790" width="420" height="88" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="800" y="842" class="h" text-anchor="middle">تحفيز • تفويض • متابعة النتائج</text>

  <line x1="470" y1="435" x2="540" y2="435" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1060" y1="435" x2="1130" y2="435" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="800" y1="745" x2="800" y2="790" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <circle cx="540" cy="435" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
  <circle cx="1060" cy="435" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
  <circle cx="800" cy="745" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
</svg>