<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="نجاح تطبيق OKRs">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 58px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 46px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">نجاح تطبيق OKRs</text>
  <text x="800" y="156" class="sub" text-anchor="middle">من كتابة الأهداف إلى ممارسة فعالة تحقق النتائج</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="525" y="255" width="550" height="220" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="345" class="white" text-anchor="middle">OKRs Practice</text>
  <text x="800" y="402" class="white2" text-anchor="middle">وضوح • تركيز • قياس • متابعة</text>

  <g filter="url(#shadow)"><rect x="100" y="300" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="280" y="355" class="h" text-anchor="middle">هدف قصير ومحفز</text>
  <line x1="175" y1="380" x2="385" y2="380" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="280" y="425" class="p" text-anchor="middle">الاتجاه قبل الأرقام</text>

  <g filter="url(#shadow)"><rect x="1140" y="300" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1320" y="355" class="h" text-anchor="middle">نتائج قابلة للقياس</text>
  <line x1="1215" y1="380" x2="1425" y2="380" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="1320" y="425" class="p" text-anchor="middle">أدلة واضحة على التقدم</text>

  <g filter="url(#shadow)"><rect x="100" y="610" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="280" y="665" class="h" text-anchor="middle">متابعة دورية</text>
  <line x1="175" y1="690" x2="385" y2="690" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="280" y="735" class="p" text-anchor="middle">مراجعة وتعلم وتعديل</text>

  <g filter="url(#shadow)"><rect x="1140" y="610" width="360" height="155" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1320" y="665" class="h" text-anchor="middle">مواءمة وشفافية</text>
  <line x1="1215" y1="690" x2="1425" y2="690" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1320" y="735" class="p" text-anchor="middle">كل فريق يعرف الاتجاه</text>

  <line x1="460" y1="375" x2="525" y2="355" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1075" y1="355" x2="1140" y2="375" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="460" y1="685" x2="590" y2="475" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1140" y1="685" x2="1010" y2="475" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="430" y="805" width="740" height="62" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="845" class="h" text-anchor="middle">OKRs تنجح عندما تصبح عادة متابعة وتعلم، لا نموذجًا شكليًا</text>
</svg>