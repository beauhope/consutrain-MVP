<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="عناصر القيادة الإدارية وأهميتها">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 31px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 46px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>
  <circle cx="300" cy="150" r="52" fill="#dce9f7" opacity=".75"/>

  <text x="800" y="95" class="title" text-anchor="middle">لماذا تعد القيادة مهارة إدارية أساسية؟</text>
  <text x="800" y="155" class="sub" text-anchor="middle">عناصر القيادة التي تحول الجهد الفردي إلى أداء جماعي</text>
  <line x1="640" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/><circle cx="800" cy="190" r="6" fill="#d9a933"/><line x1="840" y1="190" x2="960" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)"><rect x="545" y="250" width="510" height="255" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/></g>
  <g stroke="#efc35a" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="800" cy="320" r="34"/>
    <path d="M720 415 q80-70 160 0"/>
    <path d="M690 452 h220"/>
    <path d="M735 452 v40 M865 452 v40"/>
  </g>
  <text x="800" y="572" class="white" text-anchor="middle">القيادة الفعالة</text>
  <text x="800" y="628" class="white2" text-anchor="middle">توجيه • تواصل • تحفيز • قرار</text>
  <rect x="628" y="655" width="344" height="56" rx="28" fill="#edbf56"/>
  <text x="800" y="692" class="pill" text-anchor="middle">فريق منسجم ونتائج أوضح</text>

  <!-- cards -->
  <g filter="url(#shadow)"><rect x="90" y="305" width="360" height="168" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="360" class="h" text-anchor="middle">التوجيه</text>
  <line x1="175" y1="383" x2="365" y2="383" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="432" class="p" text-anchor="middle">توضيح الهدف والأولويات</text>

  <g filter="url(#shadow)"><rect x="1150" y="305" width="360" height="168" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="360" class="h" text-anchor="middle">التواصل</text>
  <line x1="1235" y1="383" x2="1425" y2="383" stroke="#d6a843" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="432" class="p" text-anchor="middle">رسائل واضحة واستماع فعلي</text>

  <g filter="url(#shadow)"><rect x="90" y="610" width="360" height="168" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="270" y="665" class="h" text-anchor="middle">التحفيز</text>
  <line x1="175" y1="688" x2="365" y2="688" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="270" y="737" class="p" text-anchor="middle">تقدير، ثقة، إزالة عوائق</text>

  <g filter="url(#shadow)"><rect x="1150" y="610" width="360" height="168" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1330" y="665" class="h" text-anchor="middle">اتخاذ القرار</text>
  <line x1="1225" y1="688" x2="1435" y2="688" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1330" y="737" class="p" text-anchor="middle">حسم مدروس وتحمل مسؤولية</text>

  <line x1="450" y1="390" x2="545" y2="390" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1055" y1="390" x2="1150" y2="390" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="450" y1="694" x2="610" y2="505" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <line x1="1150" y1="694" x2="990" y2="505" stroke="#d5a033" stroke-width="6" stroke-linecap="round"/>
  <circle cx="545" cy="390" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
  <circle cx="1055" cy="390" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
  <circle cx="610" cy="505" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
  <circle cx="990" cy="505" r="13" fill="#fff" stroke="#d5a033" stroke-width="6"/>
</svg>