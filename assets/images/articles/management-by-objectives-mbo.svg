<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="الإدارة بالأهداف MBO">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#f7fbff"/><stop offset="100%" stop-color="#fff8ee"/></linearGradient>
    <linearGradient id="main" x1="0" x2="1" y1="0" y2="1"><stop offset="0%" stop-color="#0f2d5d"/><stop offset="100%" stop-color="#1f6a94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f2d5d" flood-opacity=".14"/></filter>
    <style>
      .title{font:700 60px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .sub{font:400 30px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#65768d}
      .h{font:700 28px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
      .p{font:400 22px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#52657f}
      .white{font:700 46px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .white2{font:400 27px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#fff}
      .pill{font:700 24px 'Segoe UI', Tahoma, Arial, sans-serif;fill:#0f2d5d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1460" cy="95" r="140" fill="#efe4d0" opacity=".64"/>
  <circle cx="130" cy="795" r="145" fill="#dce9f7" opacity=".7"/>

  <text x="800" y="96" class="title" text-anchor="middle">الإدارة بالأهداف MBO</text>
  <text x="800" y="156" class="sub" text-anchor="middle">تحويل أهداف المؤسسة إلى التزام ونتائج قابلة للمتابعة</text>
  <line x1="645" y1="190" x2="760" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>
  <circle cx="800" cy="190" r="6" fill="#d9a933"/>
  <line x1="840" y1="190" x2="955" y2="190" stroke="#d9a933" stroke-width="5" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="535" y="240" width="530" height="190" rx="42" fill="url(#main)" stroke="#e2b653" stroke-width="4"/>
  </g>
  <text x="800" y="320" class="white" text-anchor="middle">هدف المؤسسة</text>
  <text x="800" y="372" class="white2" text-anchor="middle">اتجاه واضح ومؤشرات ونتائج</text>

  <path d="M800 430 V500" stroke="#d5a033" stroke-width="7" stroke-linecap="round"/>
  <path d="M800 500 H310 V560" stroke="#d5a033" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M800 500 H800 V560" stroke="#d5a033" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M800 500 H1290 V560" stroke="#d5a033" stroke-width="7" stroke-linecap="round" fill="none"/>

  <g filter="url(#shadow)"><rect x="115" y="560" width="390" height="180" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="310" y="620" class="h" text-anchor="middle">أهداف الإدارات</text>
  <line x1="205" y1="645" x2="415" y2="645" stroke="#6fa7d9" stroke-width="4" stroke-linecap="round"/>
  <text x="310" y="695" class="p" text-anchor="middle">ترجمة الاستراتيجية إلى مجالات عمل</text>

  <g filter="url(#shadow)"><rect x="605" y="560" width="390" height="180" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="800" y="620" class="h" text-anchor="middle">أهداف الفرق</text>
  <line x1="695" y1="645" x2="905" y2="645" stroke="#7ab987" stroke-width="4" stroke-linecap="round"/>
  <text x="800" y="695" class="p" text-anchor="middle">تنسيق الجهود وتحديد الأولويات</text>

  <g filter="url(#shadow)"><rect x="1095" y="560" width="390" height="180" rx="30" fill="#fff" stroke="#c4d9ee" stroke-width="2"/></g>
  <text x="1290" y="620" class="h" text-anchor="middle">أهداف الأفراد</text>
  <line x1="1185" y1="645" x2="1395" y2="645" stroke="#e07a5f" stroke-width="4" stroke-linecap="round"/>
  <text x="1290" y="695" class="p" text-anchor="middle">مسؤولية ومتابعة وتحفيز</text>

  <g filter="url(#shadow)">
    <rect x="455" y="790" width="690" height="62" rx="28" fill="#fff" stroke="#c4d9ee" stroke-width="2"/>
  </g>
  <text x="800" y="830" class="h" text-anchor="middle">كل هدف يحتاج اتفاقًا، قياسًا، مساءلة، ودعمًا قياديًا</text>
</svg>