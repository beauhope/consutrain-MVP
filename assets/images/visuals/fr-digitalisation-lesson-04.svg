<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Du papier au service numérique suivi</title>
  <desc id="desc">Quatre étapes montrent l'évolution d'un service papier vers un service numérisé, un service numérique suivi et un libre-service assisté.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff"/><stop offset="1" stop-color="#edf3f8"/></linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0"><stop stop-color="#c88912"/><stop offset="1" stop-color="#efbd4f"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#0f2747" flood-opacity=".12"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0l10 5-10 5z" fill="#d89a20"/></marker>
  </defs>
  <rect x="24" y="24" width="912" height="492" rx="30" fill="url(#bg)" stroke="#d8e1eb" stroke-width="3"/>
  <text x="480" y="66" text-anchor="middle" fill="#0f2747" font-family="Arial, sans-serif" font-size="28" font-weight="700">Du papier au service numérique suivi</text>
  <path d="M218 270h52M438 270h52M658 270h52" stroke="#d89a20" stroke-width="7" marker-end="url(#arrow)"/>

  <g font-family="Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(46 112)">
      <rect width="172" height="318" rx="24" fill="#fff" stroke="#d8e1eb" stroke-width="3"/>
      <circle cx="86" cy="48" r="30" fill="#0f2747"/><text x="86" y="57" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">1</text>
      <path d="M55 103h62v84H55z" fill="#fff8e6" stroke="#d89a20" stroke-width="4"/>
      <path d="M68 126h36M68 144h36M68 162h25" stroke="#0f2747" stroke-width="4" stroke-linecap="round"/>
      <text x="86" y="226" text-anchor="middle" fill="#0f2747" font-size="21" font-weight="700">Papier</text>
      <text x="86" y="258" text-anchor="middle" fill="#52677d" font-size="16">Dépôt manuel</text>
      <text x="86" y="282" text-anchor="middle" fill="#52677d" font-size="16">Suivi par appels</text>
    </g>
    <g transform="translate(266 112)">
      <rect width="172" height="318" rx="24" fill="#fff" stroke="#d8e1eb" stroke-width="3"/>
      <circle cx="86" cy="48" r="30" fill="#0f2747"/><text x="86" y="57" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">2</text>
      <rect x="48" y="102" width="76" height="92" rx="12" fill="#edf3f8" stroke="#0f2747" stroke-width="4"/>
      <rect x="61" y="120" width="50" height="9" rx="4" fill="#d8e1eb"/><rect x="61" y="140" width="50" height="9" rx="4" fill="#d8e1eb"/>
      <rect x="70" y="166" width="32" height="10" rx="5" fill="url(#gold)"/>
      <text x="86" y="226" text-anchor="middle" fill="#0f2747" font-size="21" font-weight="700">Numérisé</text>
      <text x="86" y="258" text-anchor="middle" fill="#52677d" font-size="16">Formulaire en ligne</text>
      <text x="86" y="282" text-anchor="middle" fill="#52677d" font-size="16">Suivi encore manuel</text>
    </g>
    <g transform="translate(486 112)">
      <rect width="172" height="318" rx="24" fill="#fff" stroke="#1f6f78" stroke-width="4"/>
      <circle cx="86" cy="48" r="30" fill="#1f6f78"/><text x="86" y="57" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">3</text>
      <rect x="37" y="102" width="98" height="95" rx="13" fill="#fff" stroke="#0f2747" stroke-width="3"/>
      <rect x="49" y="116" width="74" height="18" rx="9" fill="#fff0c7"/>
      <path d="M51 157h68M51 174h48" stroke="#0f2747" stroke-width="4" stroke-linecap="round"/>
      <circle cx="119" cy="175" r="8" fill="#1f6f78"/>
      <text x="86" y="226" text-anchor="middle" fill="#0f2747" font-size="20" font-weight="700">Numérique suivi</text>
      <text x="86" y="258" text-anchor="middle" fill="#52677d" font-size="16">Numéro et statut</text>
      <text x="86" y="282" text-anchor="middle" fill="#52677d" font-size="16">Alertes et délais</text>
    </g>
    <g transform="translate(706 112)">
      <rect width="208" height="318" rx="24" fill="#fff" stroke="#d8e1eb" stroke-width="3"/>
      <circle cx="104" cy="48" r="30" fill="#1f6f78"/><text x="104" y="57" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">4</text>
      <rect x="60" y="103" width="88" height="78" rx="18" fill="#edf3f8" stroke="#0f2747" stroke-width="3"/>
      <path d="M81 131h46M81 147h32" stroke="#0f2747" stroke-width="4" stroke-linecap="round"/>
      <circle cx="139" cy="172" r="19" fill="#fff0c7" stroke="#d89a20" stroke-width="3"/>
      <path d="M132 172l5 5 10-12" fill="none" stroke="#0f2747" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="104" y="226" text-anchor="middle" fill="#0f2747" font-size="19" font-weight="700">Libre-service assisté</text>
      <text x="104" y="258" text-anchor="middle" fill="#52677d" font-size="16">Cas simples guidés</text>
      <text x="104" y="282" text-anchor="middle" fill="#52677d" font-size="16">Relais humain possible</text>
    </g>
  </g>
  <rect x="304" y="455" width="352" height="34" rx="17" fill="#0f2747"/>
  <text x="480" y="478" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="17" font-weight="700">Simplicité • Traçabilité • Visibilité • Délais maîtrisés</text>
</svg>
