<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Digitalisation et transformation numérique</title>
  <desc id="desc">Deux colonnes comparent un formulaire devenu numérique à un processus intégré comportant suivi, alertes, tableau de bord et rapports.</desc>
