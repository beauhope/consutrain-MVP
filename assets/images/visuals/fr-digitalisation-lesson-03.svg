<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Les sept étapes de la digitalisation</title>
  <desc id="desc">Un processus horizontal présente sept étapes numérotées, du diagnostic à l'amélioration continue.</desc>
  <defs>
