      <circle cx="85" cy="0" r="27" fill="#0f2747"/><text x="85" y="8" text-anchor="middle" fill="#fff" font-size="22" font-weight="700">1</text>
      <circle cx="85" cy="52" r="24" fill="#edf3f8"/><path d="M73 60l10-10 8 7 10-15" fill="none" stroke="#0f2747" stroke-width="5" stroke-linecap="round"/>
      <text x="85" y="101" text-anchor="middle" fill="#0f2747" font-size="19" font-weight="700">Diagnostiquer</text>
    </g>
