<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">Canaux dispersés vers une demande structurée et suivie</title>
  <desc id="desc">Un téléphone, un e-mail, une messagerie et une note papier convergent vers un formulaire unique, puis vers une fiche de suivi avec numéro, statut et responsable.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#edf3f8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="1" x2="1" y2="0">
      <stop stop-color="#c88912"/>
      <stop offset="1" stop-color="#efbd4f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="9" stdDeviation="10" flood-color="#0f2747" flood-opacity=".13"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0l10 5-10 5z" fill="#d89a20"/>
    </marker>
  </defs>
  <rect x="24" y="24" width="912" height="492" rx="30" fill="url(#bg)" stroke="#d8e1eb" stroke-width="3"/>
  <text x="64" y="70" fill="#0f2747" font-family="Arial, sans-serif" font-size="26" font-weight="700">Canaux dispersés</text>
  <text x="615" y="70" fill="#0f2747" font-family="Arial, sans-serif" font-size="26" font-weight="700">Demande structurée et suivie</text>

  <g filter="url(#shadow)">
    <rect x="62" y="105" width="170" height="78" rx="18" fill="#fff" stroke="#d8e1eb" stroke-width="3"/>
    <rect x="82" y="123" width="30" height="44" rx="7" fill="#0f2747"/>
    <rect x="88" y="130" width="18" height="26" rx="3" fill="#edf3f8"/>
    <circle cx="97" cy="162" r="3" fill="#efbd4f"/>
    <text x="128" y="151" fill="#0f2747" font-family="Arial, sans-serif" font-size="21" font-weight="700">Téléphone</text>

    <rect x="62" y="205" width="170" height="78" rx="18" fill="#fff" stroke="#d8e1eb" stroke-width="3"/>
    <rect x="81" y="225" width="38" height="28" rx="4" fill="#0f2747"/>
    <path d="M82 227l18 15 18-15" fill="none" stroke="#efbd4f" stroke-width="4"/>
    <text x="135" y="251" fill="#0f2747" font-family="Arial, sans-serif" font-size="21" font-weight="700">E-mail</text>

    <rect x="62" y="305" width="170" height="78" rx="18" fill="#fff" stroke="#d8e1eb" stroke-width="3"/>
    <path d="M82 323h39v28H99l-10 10v-10h-7z" fill="#0f2747"/>
    <circle cx="93" cy="337" r="3" fill="#efbd4f"/><circle cx="102" cy="337" r="3" fill="#efbd4f"/><circle cx="111" cy="337" r="3" fill="#efbd4f"/>
    <text x="135" y="351" fill="#0f2747" font-family="Arial, sans-serif" font-size="21" font-weight="700">Message</text>

    <rect x="62" y="405" width="170" height="78" rx="18" fill="#fff" stroke="#d8e1eb" stroke-width="3"/>
    <path d="M83 420h38v45H83z" fill="#fff8e6" stroke="#d89a20" stroke-width="3"/>
    <path d="M90 433h24M90 443h24M90 453h17" stroke="#0f2747" stroke-width="3" stroke-linecap="round"/>
    <text x="135" y="451" fill="#0f2747" font-family="Arial, sans-serif" font-size="21" font-weight="700">Note papier</text>
  </g>

  <path d="M250 144C330 144 335 220 390 250M250 244h140M250 344c80 0 85-70 140-82M250 444c90 0 100-135 140-172"
        fill="none" stroke="#d89a20" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="405" y="154" width="205" height="232" rx="24" fill="#fff" stroke="#0f2747" stroke-width="4"/>
    <rect x="405" y="154" width="205" height="54" rx="22" fill="#0f2747"/>
    <path d="M405 185h205" stroke="#0f2747" stroke-width="45"/>
    <text x="507" y="189" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="21" font-weight="700">Formulaire unique</text>
    <text x="430" y="239" fill="#52677d" font-family="Arial, sans-serif" font-size="17">Type de demande</text>
    <rect x="430" y="250" width="155" height="25" rx="6" fill="#edf3f8"/>
    <text x="430" y="306" fill="#52677d" font-family="Arial, sans-serif" font-size="17">Informations utiles</text>
    <rect x="430" y="317" width="155" height="25" rx="6" fill="#edf3f8"/>
    <rect x="471" y="354" width="74" height="18" rx="9" fill="url(#gold)"/>
  </g>

  <path d="M625 270h66" fill="none" stroke="#d89a20" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="710" y="122" width="190" height="312" rx="24" fill="#fff" stroke="#d8e1eb" stroke-width="3"/>
    <rect x="710" y="122" width="190" height="58" rx="22" fill="#0f2747"/>
    <text x="805" y="158" text-anchor="middle" fill="#fff" font-family="Arial, sans-serif" font-size="21" font-weight="700">Suivi commun</text>
    <text x="730" y="216" fill="#52677d" font-family="Arial, sans-serif" font-size="16">Numéro</text>
    <text x="878" y="216" text-anchor="end" fill="#0f2747" font-family="Arial, sans-serif" font-size="18" font-weight="700">REQ-024</text>
    <path d="M730 230h150" stroke="#d8e1eb" stroke-width="2"/>
    <text x="730" y="267" fill="#52677d" font-family="Arial, sans-serif" font-size="16">Statut</text>
    <rect x="814" y="246" width="66" height="28" rx="14" fill="#fff0c7"/>
    <text x="847" y="266" text-anchor="middle" fill="#815b08" font-family="Arial, sans-serif" font-size="14" font-weight="700">En cours</text>
    <text x="730" y="316" fill="#52677d" font-family="Arial, sans-serif" font-size="16">Responsable</text>
    <circle cx="850" cy="309" r="17" fill="#1f6f78"/>
    <path d="M842 310l6 6 11-13" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="878" y="316" text-anchor="end" fill="#0f2747" font-family="Arial, sans-serif" font-size="16" font-weight="700">Assigné</text>
    <path d="M730 339h150" stroke="#d8e1eb" stroke-width="2"/>
    <text x="730" y="375" fill="#52677d" font-family="Arial, sans-serif" font-size="16">Progression</text>
    <rect x="730" y="388" width="150" height="14" rx="7" fill="#edf3f8"/>
    <rect x="730" y="388" width="96" height="14" rx="7" fill="url(#gold)"/>
  </g>
</svg>
