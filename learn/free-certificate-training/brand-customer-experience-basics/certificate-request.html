<!doctype html>
<html lang="ar" dir="rtl" data-fr-link="../../../fr/learn/free-certificate-training/brand-customer-experience-basics/certificate-request.html">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>طلب شهادة أساسيات العلامة وتجربة العميل | ConsuTrain</title>
  <link rel="stylesheet" href="../../../assets/css/style.css?v=20260626_brand_cx_training">
  <style>
    body { background:#f7f9fc; }
    .certificate-form { display:grid; gap:18px; }
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:14px; }
    .form-field { display:grid; gap:6px; }
    .form-field input { border:1px solid var(--border); border-radius:8px; padding:12px; font:inherit; }
    .certificate-question { background:#fff; border:1px solid var(--border); border-radius:10px; margin-bottom:14px; padding:16px; }
    .certificate-options { display:grid; gap:10px; }
    .certificate-radio { align-items:flex-start; background:#f7f9fc; border:1px solid var(--border); border-radius:8px; cursor:pointer; display:flex; gap:10px; padding:10px; }
    .certificate-status { border-radius:10px; font-weight:800; line-height:1.8; padding:14px 16px; }
    .certificate-status.success { background:#e8f7ee; color:#14532d; }
    .certificate-status.error { background:#fee2e2; color:#7f1d1d; }
    .certificate-status.warning { background:#fff7ed; color:#7c2d12; }
    .training-actions { display:flex; flex-wrap:wrap; gap:12px; }
  </style>
</head>
<body data-root="../../.." data-breadcrumb-section="التدريب المجاني" data-breadcrumb-title="طلب الشهادة">
<div id="header-placeholder"></div><div id="breadcrumbs-placeholder"></div>
<main class="inner-page">
<section class="page-hero"><div class="container"><span class="eyebrow">شهادة إتمام مجانية</span><h1>اختبار وطلب شهادة أساسيات العلامة وتجربة العميل</h1><p>أجب عن 20 سؤالًا. عند تحقيق 14 إجابة صحيحة أو أكثر، يتم إرسال طلب الشهادة عبر مسار الشهادات الحالي.</p></div></section>
<section class="home-section"><div class="container">
<form id="certificateTrainingForm" class="certificate-form" data-training-id="brand-customer-experience-basics" data-language="ar" data-training-title="أساسيات العلامة التجارية وتجربة العميل للمشاريع الصغيرة" data-certificate-type="free_test" data-learning-type="free_training" data-training-category="branding_customer_experience">
<article class="section-card"><h2>بيانات المتدرب</h2><div class="form-grid">
<label class="form-field">الاسم الكامل<input type="text" name="fullName" required autocomplete="name"></label>
<label class="form-field">البريد الإلكتروني<input type="email" name="email" required autocomplete="email"></label>
<label class="form-field">البلد<input type="text" name="country" required autocomplete="country-name"></label>
<label class="form-field">المؤسسة<input type="text" name="organization" autocomplete="organization"></label>
<label class="form-field">المسمى الوظيفي<input type="text" name="jobTitle" autocomplete="organization-title"></label>
</div></article>
<section id="certificateQuestions" aria-label="أسئلة الاختبار"></section>
<article class="section-card">
<label class="certificate-radio"><input type="checkbox" name="legalAcknowledgment" required><span>أقر بأن البيانات المدخلة صحيحة وأن شهادة الإتمام تثبت إكمال تدريب ConsuTrain واجتياز الاختبار، ولا تعد اعتمادًا مهنيًا رسميًا.</span></label>
<label class="certificate-radio"><input type="checkbox" name="marketingConsent"><span>أوافق على استقبال تحديثات تدريبية من ConsuTrain.</span></label>
<div id="certificateStatus" class="certificate-status" hidden></div>
<div class="training-actions">
<button id="certificateSubmitBtn" class="btn btn-primary" type="submit">إرسال طلب الشهادة</button>
<button id="certificateResetBtn" class="btn btn-secondary" type="button">إعادة المحاولة</button>
<a class="btn btn-secondary" href="index.html">العودة إلى التدريب</a>
</div>
<div id="certificateResultActions" class="training-actions" hidden><a class="btn btn-primary" href="../../../learn/free-certificate-training.html">تدريبات مجانية أخرى</a></div>
</article>
</form>
</div></section></main>
<div id="footer-placeholder"></div>
<script src="../../../assets/js/includes.js?v=20260504_menu"></script>
<script src="../../../assets/js/free-certificate-training-brand-cx.js?v=20260626_brand_cx_training"></script>
</body></html>
