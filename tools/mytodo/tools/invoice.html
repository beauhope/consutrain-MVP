<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>فاتورة/عرض سعر</title>

  <!-- FAVICON — MyTodo -->
  <link rel="icon" type="image/svg+xml"
    href='data:image/svg+xml,
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="%230b1020"/>
          <stop offset="1" stop-color="%234f7cff"/>
        </linearGradient>
      </defs>
      <rect width="64" height="64" rx="14" fill="url(%23g)"/>
      <rect x="4" y="4" width="56" height="56" rx="12"
            fill="none" stroke="%23fbbf24" stroke-width="2"/>
      <text x="50%" y="52%" text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="22"
            font-weight="800"
            fill="%23eef2ff">MT</text>
      <text x="50%" y="78%" text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="10"
            font-weight="700"
            fill="%23fbbf24">TODO</text>
    </svg>'>

  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#0a1124">
  <link rel="stylesheet" href="../css/style.css?v=20260302_1">

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("../sw.js", { scope: "../" });
      });
    }
  </script>

  <style>
    /* تحسينات بسيطة داخل صفحة الفواتير فقط */
    .inv-toolbar{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px;
    }
    .inv-toolbar .right{
      margin-inline-start:auto; display:flex; gap:8px; flex-wrap:wrap;
    }
    .inv-pills{
      display:flex; gap:8px; flex-wrap:wrap;
    }
    .inv-table{
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      min-width: 760px;
    }
    .inv-table th, .inv-table td{
      padding:10px 8px;
      border-bottom:1px solid rgba(255,255,255,.10);
      vertical-align:top;
    }
    .inv-table th{
      background: rgba(255,255,255,.06);
      color: var(--muted);
      text-align:right;
      font-weight:800;
      font-size:13px;
    }
    .inv-table td{ font-size:13px; }
    .inv-table tr:last-child td{ border-bottom:none; }
    .inv-table input, .inv-table textarea, .inv-table select{
      width:100%;
    }
    .inv-totals{
      display:grid; gap:8px;
    }
    .inv-line{
      display:flex; justify-content:space-between; align-items:center;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      font-size:13px;
    }
    .inv-line b{ font-size:14px; }
    .inv-grand{
      border-color: rgba(198,167,74,.45);
      background: rgba(198,167,74,.10);
    }
    .inv-grand span, .inv-grand b{ color: var(--gold); font-weight:900; }
    @media (max-width: 820px){
      .inv-scroll{ overflow:auto; }
    }

    /* طباعة مبسطة */
    @media print{
      body{ background:#fff !important; color:#111 !important; }
      header, nav, footer, .sidebar, .topbar, .shell-header, .shell-footer { display:none !important; }
      .inv-hide-print { display:none !important; }
      .card{ box-shadow:none !important; border:1px solid #ddd !important; }
    }
  </style>
</head>

<body>
  <div id="shellMount"></div>

  <script>
    async function mountShell(){
      const res = await fetch("../templates/page-shell.html", { cache: "no-store" });
      const shell = await res.text();
      document.getElementById("shellMount").innerHTML = shell;
    }

    const $ = (id) => document.getElementById(id);

    function pad(n){ return String(n).padStart(2,"0"); }
    function todayISO(){
      const d = new Date();
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    }
    function genInvoiceNo(prefix){
      const d = new Date();
      const yy = String(d.getFullYear()).slice(-2);
      const mm = pad(d.getMonth()+1);
      const dd = pad(d.getDate());
      const rnd = Math.floor(Math.random()*9000)+1000;
      return `${prefix}-${yy}${mm}${dd}-${rnd}`;
    }
    function escapeHtml(s){
      return String(s ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }
    function money(n){
      const cur = $("currency")?.value || "MAD";
      const v = Number(n || 0);
      return `${v.toFixed(2)} ${cur}`;
    }

    // LocalStorage (this page only)
    const LS_INV = "mytodo_invoices_v0";

    function loadLocal(){
      try { return JSON.parse(localStorage.getItem(LS_INV) || "{}"); }
      catch { return {}; }
    }
    function saveLocal(obj){
      localStorage.setItem(LS_INV, JSON.stringify(obj));
    }

    const state = {
      invNo: "",
      invDate: "",
      docType: "invoice",
      currency: "MAD",
      sellerName: "",
      sellerContact: "",
      clientName: "",
      refNote: "",
      notes: "",
      taxRate: "",
      discount: "",
      items: []
    };

    function ensureDefaults(){
      if(!state.invDate) state.invDate = todayISO();
      if(!state.invNo){
        const prefix = (state.docType === "quote") ? "QTE" : "INV";
        state.invNo = genInvoiceNo(prefix);
      }
      if(!Array.isArray(state.items) || state.items.length === 0){
        state.items = [{ desc:"خدمة/منتج", qty:1, price:0 }];
      }
    }

    function render(){
      const content = $("pageContent");
      content.innerHTML = `
        <div class="inv-toolbar inv-hide-print">
          <button class="btn-primary small" id="addRowBtn">+ إضافة منتج/خدمة</button>
          <button class="btn-gold small" id="printBtn">🖨️ طباعة</button>
          <button class="btn-primary small" id="saveBtn">💾 حفظ</button>
          <button class="btn-danger small" id="resetBtn">↺ تفريغ</button>

          <div class="right inv-pills">
            <div class="pill">رقم: <b id="invNoView">—</b></div>
            <div class="pill">التاريخ: <b id="invDateView">—</b></div>
          </div>
        </div>

        <div class="row" style="gap:10px;">
          <div class="field" style="flex:1; min-width:220px;">
            <label>النوع</label>
            <select id="docType">
              <option value="invoice">فاتورة</option>
              <option value="quote">عرض سعر</option>
            </select>
          </div>

          <div class="field" style="flex:1; min-width:220px;">
            <label>العملة</label>
            <select id="currency">
              <option value="MAD">MAD</option>
              <option value="SAR">SAR</option>
              <option value="AED">AED</option>
              <option value="USD">USD</option>
              <option value="EUR">EUR</option>
            </select>
          </div>
        </div>

        <div class="row" style="gap:10px; margin-top:10px;">
          <div class="field" style="flex:1; min-width:220px;">
            <label>اسم البائع/الشركة</label>
            <input id="sellerName" placeholder="مثال: MyTodo / ConsuTrain">
          </div>
          <div class="field" style="flex:1; min-width:220px;">
            <label>هاتف/بريد</label>
            <input id="sellerContact" placeholder="الهاتف أو البريد">
          </div>
        </div>

        <div class="row" style="gap:10px; margin-top:10px;">
          <div class="field" style="flex:1; min-width:220px;">
            <label>اسم العميل</label>
            <input id="clientName" placeholder="اسم العميل">
          </div>
          <div class="field" style="flex:1; min-width:220px;">
            <label>مرجع/ملاحظة</label>
            <input id="refNote" placeholder="PO-123 / مشروع...">
          </div>
        </div>

        <div class="field" style="margin-top:10px;">
          <label>ملاحظات</label>
          <textarea id="notes" placeholder="أي ملاحظات مختصرة..."></textarea>
        </div>

        <div class="row" style="gap:10px; margin-top:10px;">
          <div class="field" style="flex:1; min-width:220px;">
            <label>نسبة الضريبة % (اختياري)</label>
            <input id="taxRate" type="number" min="0" step="0.01" placeholder="مثال: 20">
          </div>
          <div class="field" style="flex:1; min-width:220px;">
            <label>خصم ثابت (اختياري)</label>
            <input id="discount" type="number" min="0" step="0.01" placeholder="مثال: 50">
          </div>
        </div>

        <div class="inv-scroll" style="margin-top:12px;">
          <table class="inv-table">
            <thead>
              <tr>
                <th>الوصف</th>
                <th style="width:120px;">الكمية</th>
                <th style="width:160px;">سعر الوحدة</th>
                <th style="width:170px;">الإجمالي</th>
                <th style="width:90px;">حذف</th>
              </tr>
            </thead>
            <tbody id="itemsBody"></tbody>
          </table>
        </div>

        <div class="card" style="margin-top:12px; padding:12px;">
          <div class="inv-totals">
            <div class="inv-line"><span style="color:var(--muted);">المجموع الفرعي</span><b id="subTotal">0.00</b></div>
            <div class="inv-line"><span style="color:var(--muted);">الضريبة</span><b id="taxTotal">0.00</b></div>
            <div class="inv-line"><span style="color:var(--muted);">الخصم</span><b id="discountTotal">0.00</b></div>
            <div class="inv-line inv-grand"><span>الإجمالي النهائي</span><b id="grandTotal">0.00</b></div>
          </div>
        </div>
        <div id="discountWarn" class="inv-hide-print" style="color:#fbbf24; margin-top:8px; display:none;">
        ⚠️ الخصم أكبر من الإجمالي، تم تعديله تلقائيًا.
      </div>
      `;
      
      // fill
      $("invNoView").textContent = state.invNo;
      $("invDateView").textContent = state.invDate;

      $("docType").value = state.docType;
      $("currency").value = state.currency;

      $("sellerName").value = state.sellerName;
      $("sellerContact").value = state.sellerContact;
      $("clientName").value = state.clientName;
      $("refNote").value = state.refNote;
      $("notes").value = state.notes;
      $("taxRate").value = state.taxRate;
      $("discount").value = state.discount;

      renderItems();
      calcTotals();
      bindEvents();
    }

    function renderItems(){
      const tbody = $("itemsBody");
      tbody.innerHTML = "";

      state.items.forEach((it, idx) => {
        const qty = Number(it.qty || 0);
        const price = Number(it.price || 0);
        const total = qty * price;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><input data-k="desc" data-i="${idx}" placeholder="اسم المنتج/الخدمة" value="${escapeHtml(it.desc)}"></td>
          <td><input data-k="qty" data-i="${idx}" type="number" min="0" step="1" value="${qty}"></td>
          <td><input data-k="price" data-i="${idx}" type="number" min="0" step="0.01" value="${price}"></td>
          <td><b>${money(total)}</b></td>
          <td style="text-align:center;">
            <button class="btn-danger small inv-hide-print" data-del="${idx}">حذف</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll("input[data-k]").forEach(inp => {
        inp.addEventListener("input", (e) => {
          const i = Number(e.target.dataset.i);
          const k = e.target.dataset.k;
          let v = e.target.value;
          if(k === "qty" || k === "price") v = Number(v || 0);
          state.items[i][k] = v;

          saveLocal(state);
          renderItems();   // لتحديث إجمالي الصف
          calcTotals();
        });
      });

      tbody.querySelectorAll("button[data-del]").forEach(btn => {
        btn.addEventListener("click", () => {
          const i = Number(btn.dataset.del);
          state.items.splice(i, 1);
          if(state.items.length === 0) state.items.push({ desc:"خدمة/منتج", qty:1, price:0 });
          saveLocal(state);
          renderItems();
          calcTotals();
        });
      });
    }

    function calcTotals(){
  const sub = state.items.reduce((s, it) => s + (Number(it.qty)||0)*(Number(it.price)||0), 0);
  const taxRate = Number(state.taxRate || 0);

  const tax = sub * (taxRate / 100);
  const maxDiscount = sub + tax;

  let discount = Number(state.discount || 0);
  let clamped = false;

  if(discount > maxDiscount){
    discount = maxDiscount;
    state.discount = String(discount.toFixed(2));
    const discEl = $("discount");
    if(discEl) discEl.value = state.discount;
    clamped = true;
    saveLocal(state);
  }

  const grand = (sub + tax) - discount;

  $("subTotal").textContent = money(sub);
  $("taxTotal").textContent = money(tax);
  $("discountTotal").textContent = money(discount);
  $("grandTotal").textContent = money(grand);

  const warn = $("discountWarn");
  if(warn) warn.style.display = clamped ? "block" : "none";
}

    function syncFromInputs(){
      state.docType = $("docType").value;
      state.currency = $("currency").value;

      state.sellerName = $("sellerName").value.trim();
      state.sellerContact = $("sellerContact").value.trim();
      state.clientName = $("clientName").value.trim();
      state.refNote = $("refNote").value.trim();
      state.notes = $("notes").value.trim();

      state.taxRate = $("taxRate").value;
      state.discount = $("discount").value;

      // إذا غيّر النوع نحدّث البادئة فقط عند التفريغ/أول مرة، لا نغيّر الرقم كل مرة
      saveLocal(state);
      calcTotals();
      renderItems(); // لتحديث العملة
    }

    function addRow(){
      state.items.push({ desc:"خدمة/منتج", qty:1, price:0 });
      saveLocal(state);
      renderItems();
      calcTotals();
    }

    function doSave(){
      syncFromInputs();
      alert("تم الحفظ محليًا ✅");
    }

    function doReset(){
      if(!confirm("تفريغ الصفحة (هذه الصفحة فقط)؟")) return;

      state.docType = "invoice";
      state.currency = "MAD";
      state.invDate = todayISO();
      state.invNo = genInvoiceNo("INV");

      state.sellerName = "";
      state.sellerContact = "";
      state.clientName = "";
      state.refNote = "";
      state.notes = "";
      state.taxRate = "";
      state.discount = "";
      state.items = [{ desc:"خدمة/منتج", qty:1, price:0 }];

      saveLocal(state);
      render();
    }

    function doPrint(){
      // قبل الطباعة نضمن آخر قيم
      syncFromInputs();
      window.print();
    }

    function bindEvents(){
      $("addRowBtn").addEventListener("click", addRow);
      $("saveBtn").addEventListener("click", doSave);
      $("resetBtn").addEventListener("click", doReset);
      $("printBtn").addEventListener("click", doPrint);

      ["docType","currency","sellerName","sellerContact","clientName","refNote","notes","taxRate","discount"]
        .forEach(id => {
          const el = $(id);
          if(!el) return;
          el.addEventListener("input", syncFromInputs);
          el.addEventListener("change", syncFromInputs);
        });
    }

    async function initPage(){
      await mountShell();

      // ترويسة الصفحة داخل الـ shell
      const title = $("pageTitle");
      const subtitle = $("pageSubtitle");

      if(title) title.textContent = "🧾 فاتورة / عرض سعر";
      if(subtitle) subtitle.textContent = "نسخة مبسطة — نفس ترويسة وتذييل MyTodo";

      // تحميل بيانات الصفحة
      const saved = loadLocal();
      Object.assign(state, saved || {});
      ensureDefaults();
      saveLocal(state);

      render();
    }

    initPage();
  </script>
</body>
</html>
