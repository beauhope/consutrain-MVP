<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>مؤقت/مواعيد سريعة</title>

  <!-- FAVICON — MyTodo -->
  <link rel="icon" type="image/svg+xml"
    href='data:image/svg+xml,
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64">
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="%230b1020"/>
          <stop offset="1" stop-color="%234f7cff"/>
        </linearGradient>
      </defs>
      <rect width="64" height="64" rx="14" fill="url(%23g)"/>
      <rect x="4" y="4" width="56" height="56" rx="12"
            fill="none" stroke="%23fbbf24" stroke-width="2"/>
      <text x="50%" y="52%" text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="22"
            font-weight="800"
            fill="%23eef2ff">MT</text>
      <text x="50%" y="78%" text-anchor="middle"
            font-family="Arial, sans-serif"
            font-size="10"
            font-weight="700"
            fill="%23fbbf24">TODO</text>
    </svg>'>

  <link rel="manifest" href="../manifest.webmanifest">
  <meta name="theme-color" content="#0a1124">
  <link rel="stylesheet" href="../css/style.css?v=20260218_2">

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("../sw.js", { scope: "../" });
      });
    }
  </script>
</head>

<body>
  <div id="shellMount"></div>

  <script>
    async function mountShell(){
      const res = await fetch("../templates/page-shell.html", { cache: "no-store" });
      const shell = await res.text();
      document.getElementById("shellMount").innerHTML = shell;
    }

    function pad(n){ return String(n).padStart(2,"0"); }
    function fmt(sec){
      sec = Math.max(0, Math.floor(sec));
      const m = Math.floor(sec/60);
      const s = sec % 60;
      return `${pad(m)}:${pad(s)}`;
    }

    // =========================
    // LocalStorage (this page only)
    // =========================
    const LS_TIMER = "mytodo_timer_settings_v1";

    function loadSettings(){
      try { return JSON.parse(localStorage.getItem(LS_TIMER) || "{}"); }
      catch { return {}; }
    }
    function saveSettings(obj){
      localStorage.setItem(LS_TIMER, JSON.stringify(obj));
    }

    async function initPage(){
      await mountShell();

      const content = document.getElementById("pageContent");
      const title = document.getElementById("pageTitle");
      const subtitle = document.getElementById("pageSubtitle");

      if(title) title.textContent = "📅 مؤقت/مواعيد سريعة";
      if(subtitle) subtitle.textContent = "Pomodoro + اجتماع + تذكير";

      content.innerHTML = `
        <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px;">
          <button class="btn-danger small" id="resetDefaultsBtn">🔄 إعادة الإعدادات الافتراضية</button>
          <small style="color:var(--muted);">يمسح إعدادات هذه الصفحة فقط.</small>
        </div>

        <!-- Pomodoro -->
        <div class="section-accordion active">
          <div class="section-header">
            <span>🍅 Pomodoro</span>
            <svg class="section-icon" width="18" height="18" viewBox="0 0 24 24">
              <path fill="currentColor" d="M7 10l5 5 5-5z"/>
            </svg>
          </div>
          <div class="section-content" style="max-height:none; opacity:1; padding:16px;">
            <div class="row">
              <div class="field" style="max-width:220px;">
                <label>مدة العمل (دقائق)</label>
                <input id="pWork" type="number" value="25" min="1">
              </div>
              <div class="field" style="max-width:220px;">
                <label>مدة الراحة (دقائق)</label>
                <input id="pBreak" type="number" value="5" min="1">
              </div>
            </div>

            <div class="card" style="margin-top:12px; padding:14px; text-align:center;">
              <div style="color:var(--muted); margin-bottom:6px;" id="pMode">وضع: عمل</div>
              <div style="font-size:42px; font-weight:900; letter-spacing:1px;" id="pTimer">25:00</div>
              <div style="color:var(--muted); margin-top:6px;" id="pCycles">الدورات: 0</div>
            </div>

            <div class="row" style="margin-top:10px;">
              <button class="btn-gold small" id="pStart">ابدأ</button>
              <button class="btn-primary small" id="pPause">إيقاف مؤقت</button>
              <button class="btn-danger small" id="pReset">إعادة</button>
            </div>

            <small style="color:var(--muted); display:block; margin-top:10px;">
              ملاحظة: عند انتهاء المؤقت يظهر تنبيه بسيط داخل الصفحة (بدون صوت).
            </small>
          </div>
        </div>

        <!-- Meeting Timer -->
        <div class="section-accordion active">
          <div class="section-header">
            <span>⏱️ عدّاد اجتماع</span>
            <svg class="section-icon" width="18" height="18" viewBox="0 0 24 24">
              <path fill="currentColor" d="M7 10l5 5 5-5z"/>
            </svg>
          </div>
          <div class="section-content" style="max-height:none; opacity:1; padding:16px;">
            <div class="row">
              <div class="field" style="max-width:220px;">
                <label>مدة الاجتماع (دقائق)</label>
                <input id="mMin" type="number" value="30" min="1">
              </div>
              
            </div>
                <div class="field" style="margin-top:10px;">
  <label>ملاحظات الاجتماع (اختياري)</label>
  <textarea id="mNotes" placeholder="اكتب نقاط الاجتماع بسرعة..."></textarea>
</div>

<div class="row" style="margin-top:10px;">
  <button class="btn-gold small" id="copyMeetingSummary">📋 نسخ ملخص الاجتماع</button>
  <button class="btn-primary small" id="waMeetingSummary">📲 واتساب</button>
  
  <button class="btn-danger small" id="clearMeetingNotes">🧹 تفريغ الملاحظات</button>
</div>
            <div class="card" style="margin-top:12px; padding:14px; text-align:center;">
              <div style="color:var(--muted); margin-bottom:6px;">الوقت المتبقي</div>
              <div style="font-size:42px; font-weight:900; letter-spacing:1px;" id="mTimer">30:00</div>
              <div style="color:var(--muted); margin-top:6px;" id="mNote">—</div>
            </div>

            <div class="row" style="margin-top:10px;">
              <button class="btn-gold small" id="mStart">ابدأ</button>
              <button class="btn-primary small" id="mPause">إيقاف مؤقت</button>
              <button class="btn-danger small" id="mReset">إعادة</button>
              <button class="btn-primary small" id="mAdd5">+5 دقائق</button>
            </div>
          </div>
        </div>

        <!-- Manual Reminder -->
        <div class="section-accordion active">
          <div class="section-header">
            <span>🔔 تذكير يدوي داخل الصفحة</span>
            <svg class="section-icon" width="18" height="18" viewBox="0 0 24 24">
              <path fill="currentColor" d="M7 10l5 5 5-5z"/>
            </svg>
          </div>
          <div class="section-content" style="max-height:none; opacity:1; padding:16px;">
            <div class="row">
              <div class="field" style="max-width:220px;">
                <label>بعد كم دقيقة؟</label>
                <input id="rMin" type="number" value="10" min="1">
              </div>
              <div class="field">
                <label>نص التذكير</label>
                <input id="rText" placeholder="مثال: اتصل بالعميل فلان">
              </div>
            </div>

            <div class="row" style="margin-top:10px;">
              <button class="btn-gold small" id="rSet">تفعيل</button>
              <button class="btn-danger small" id="rCancel">إلغاء</button>
            </div>

            <div class="card" style="margin-top:12px; padding:12px;">
              <div style="color:var(--muted); margin-bottom:6px;">الحالة</div>
              <div id="rStatus">لا يوجد تذكير مفعل.</div>
            </div>
          </div>
        </div>
      `;

      // ========= Grab elements =========
      const pWork = document.getElementById("pWork");
      const pBreak = document.getElementById("pBreak");
      const pTimer = document.getElementById("pTimer");
      const pMode = document.getElementById("pMode");
      const pCyclesEl = document.getElementById("pCycles");

      const mMin = document.getElementById("mMin");
      const mNotes = document.getElementById("mNotes");
      const mTimer = document.getElementById("mTimer");
      const mNote = document.getElementById("mNote");

      const rMin = document.getElementById("rMin");
      const rText = document.getElementById("rText");
      const rStatus = document.getElementById("rStatus");

      // ========= Restore settings =========
      const S = loadSettings();
      if (S.pWork) pWork.value = S.pWork;
      if (S.pBreak) pBreak.value = S.pBreak;
      if (S.mMin) mMin.value = S.mMin;
      if (S.rMin) rMin.value = S.rMin;
      if (typeof S.rText === "string") rText.value = S.rText;
      if (typeof S.mNotes === "string") mNotes.value = S.mNotes;
      // ========= Persist settings =========
      function persist(){
        saveSettings({
          pWork: Number(pWork.value || 25),
          pBreak: Number(pBreak.value || 5),
          mMin: Number(mMin.value || 30),
          rMin: Number(rMin.value || 10),
          rText: String(rText.value || ""),
          mNotes: String(mNotes.value || "")
        });
      }
      ["pWork","pBreak","mMin","mNotes","rMin","rText"].forEach(id => {
        const el = document.getElementById(id);
        if(!el) return;
        el.addEventListener("input", persist);
        el.addEventListener("change", persist);
      });
      persist(); // initial save

      // ========= Pomodoro logic =========
      let pInterval = null;
      let pSeconds = 25 * 60;
      let pIsWork = true;
      let pCycles = 0;

      function pSyncFromInputs(){
        const w = Math.max(1, Number(pWork.value||25));
        const b = Math.max(1, Number(pBreak.value||5));
        pSeconds = (pIsWork ? w : b) * 60;
        pTimer.textContent = fmt(pSeconds);
        pMode.textContent = `وضع: ${pIsWork ? "عمل" : "راحة"}`;
        pCyclesEl.textContent = `الدورات: ${pCycles}`;
      }

      function pTick(){
        pSeconds -= 1;
        pTimer.textContent = fmt(pSeconds);

        if(pSeconds <= 0){
          pIsWork = !pIsWork;
          if(pIsWork) pCycles += 1;

          const w = Math.max(1, Number(pWork.value||25));
          const b = Math.max(1, Number(pBreak.value||5));
          pSeconds = (pIsWork ? w : b) * 60;

          pMode.textContent = `✅ انتهى! وضع: ${pIsWork ? "عمل" : "راحة"}`;
          pCyclesEl.textContent = `الدورات: ${pCycles}`;
          setTimeout(() => {
            pMode.textContent = `وضع: ${pIsWork ? "عمل" : "راحة"}`;
          }, 1200);
        }
      }

      document.getElementById("pStart").addEventListener("click", () => {
        if(pInterval) return;
        pSyncFromInputs();
        pInterval = setInterval(pTick, 1000);
      });

      document.getElementById("pPause").addEventListener("click", () => {
        if(pInterval){ clearInterval(pInterval); pInterval = null; }
      });

      document.getElementById("pReset").addEventListener("click", () => {
        if(pInterval){ clearInterval(pInterval); pInterval = null; }
        pIsWork = true;
        pCycles = 0;
        pSyncFromInputs();
      });

      pWork.addEventListener("input", () => { if(!pInterval){ pIsWork = true; pSyncFromInputs(); } });
      pBreak.addEventListener("input", () => { if(!pInterval){ pSyncFromInputs(); } });
      pSyncFromInputs();

      // ========= Meeting timer =========
      let mInterval = null;
      let mSeconds = 30 * 60;

      function mSync(){
        const mm = Math.max(1, Number(mMin.value||30));
        mSeconds = mm * 60;
        mTimer.textContent = fmt(mSeconds);
        mNote.textContent = "—";
      }
      function buildMeetingSummary(){
  const minutes = Math.max(1, Number(mMin.value || 30));
  const notes = (mNotes.value || "").trim();

  const now = new Date();
  const dateStr = now.toLocaleDateString();
  const timeStr = now.toLocaleTimeString();

  return `ملخص اجتماع (${dateStr} — ${timeStr})
- مدة الاجتماع: ${minutes} دقيقة
- ملاحظات:
${notes ? notes : "—"}
`;
}

document.getElementById("copyMeetingSummary").addEventListener("click", async () => {
  const text = buildMeetingSummary();
  try{
    await navigator.clipboard.writeText(text);
    const btn = document.getElementById("copyMeetingSummary");
    const old = btn.textContent;
    btn.textContent = "✅ تم النسخ";
    setTimeout(()=> btn.textContent = old, 1000);
  }catch{
    alert("تعذر النسخ. جرّب النسخ اليدوي.");
  }
});

document.getElementById("waMeetingSummary").addEventListener("click", () => {
  const text = buildMeetingSummary();
  const url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.open(url, "_blank", "noopener");
});

document.getElementById("clearMeetingNotes").addEventListener("click", () => {
  if(!confirm("تفريغ ملاحظات الاجتماع فقط؟")) return;

  mNotes.value = "";
  persist(); // يحفظ التغيير في LocalStorage بدون لمس باقي الإعدادات

  // رسالة صغيرة
  const old = mNote.textContent;
  mNote.textContent = "✅ تم تفريغ الملاحظات";
  setTimeout(()=> { mNote.textContent = old; }, 1200);
});


      function mTick(){
        mSeconds -= 1;
        mTimer.textContent = fmt(mSeconds);

        if(mSeconds === 5*60) mNote.textContent = "⏳ بقي 5 دقائق";
        if(mSeconds === 60) mNote.textContent = "⚠️ بقي دقيقة واحدة";

        if(mSeconds <= 0){
          clearInterval(mInterval);
          mInterval = null;
          mTimer.textContent = "00:00";
          mNote.textContent = "✅ انتهى الاجتماع";
        }
      }

      document.getElementById("mStart").addEventListener("click", () => {
        if(mInterval) return;
        mSync();
        mInterval = setInterval(mTick, 1000);
      });

      document.getElementById("mPause").addEventListener("click", () => {
        if(mInterval){ clearInterval(mInterval); mInterval = null; }
      });

      document.getElementById("mReset").addEventListener("click", () => {
        if(mInterval){ clearInterval(mInterval); mInterval = null; }
        mSync();
      });

      document.getElementById("mAdd5").addEventListener("click", () => {
        mSeconds += 5*60;
        mTimer.textContent = fmt(mSeconds);
        mNote.textContent = "➕ تمت إضافة 5 دقائق";
        setTimeout(()=>{ mNote.textContent = "—"; }, 1200);
      });

      mMin.addEventListener("input", () => { if(!mInterval) mSync(); });
      mSync();

      // ========= Manual reminder =========
      let rTimeout = null;

      document.getElementById("rSet").addEventListener("click", () => {
        if(rTimeout){ clearTimeout(rTimeout); rTimeout = null; }

        const mins = Math.max(1, Number(rMin.value||10));
        const msg = (rText.value || "تذكير").trim();
        const fireAt = new Date(Date.now() + mins*60*1000);

        rStatus.textContent = `✅ تم تفعيل تذكير بعد ${mins} دقيقة — ${msg} (عند: ${fireAt.toLocaleTimeString()})`;

        rTimeout = setTimeout(() => {
          rStatus.textContent = `🔔 ${msg}`;
          rStatus.parentElement.style.boxShadow = "0 0 18px rgba(198,167,74,.35)";
          setTimeout(()=> rStatus.parentElement.style.boxShadow = "none", 1500);
        }, mins*60*1000);
      });

      document.getElementById("rCancel").addEventListener("click", () => {
        if(rTimeout){ clearTimeout(rTimeout); rTimeout = null; }
        rStatus.textContent = "لا يوجد تذكير مفعل.";
      });

      // ========= Reset defaults (only this page storage) =========
      document.getElementById("resetDefaultsBtn").addEventListener("click", () => {
        if(!confirm("سيتم مسح إعدادات هذه الصفحة فقط وإرجاع القيم الافتراضية. متابعة؟")) return;

        // stop timers
        if(pInterval){ clearInterval(pInterval); pInterval = null; }
        if(mInterval){ clearInterval(mInterval); mInterval = null; }
        if(rTimeout){ clearTimeout(rTimeout); rTimeout = null; }

        // clear storage
        localStorage.removeItem(LS_TIMER);

        // defaults
        pWork.value = 25;
        pBreak.value = 5;
        mMin.value = 30;
        mNotes.value = "";
        rMin.value = 10;
        rText.value = "";

        // reset states
        pIsWork = true;
        pCycles = 0;
        pSyncFromInputs();

        mSync();

        rStatus.textContent = "لا يوجد تذكير مفعل.";

        // persist again
        persist();
      });
    }

    initPage();
  </script>
</body>
</html>
