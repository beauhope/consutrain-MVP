<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>أحدث نسخة من دليل ConsuTrain</title>
  <style>
    body{font-family:Arial,"Segoe UI",sans-serif;background:#f5f7fb;color:#0f2747;margin:0;display:grid;place-items:center;min-height:100vh;padding:24px;box-sizing:border-box}
    main{max-width:620px;background:#fff;border:1px solid #e4e7ec;border-radius:20px;padding:28px;box-shadow:0 12px 34px rgba(15,39,71,.1);text-align:center}
    a{display:inline-flex;margin-top:14px;padding:11px 18px;border-radius:12px;background:#0f2747;color:#fff;text-decoration:none;font-weight:700}
    p{line-height:1.8;color:#667085}
  </style>
</head>
<body>
<main>
  <h1>جاري تجهيز أحدث نسخة من الدليل</h1>
  <p id="status">سيتم فتح أو تنزيل أحدث نسخة منشورة خلال لحظات.</p>
  <a id="fallback" href="#" hidden>فتح ملف PDF</a>
</main>
<script>
(async () => {
  const status = document.getElementById('status');
  const fallback = document.getElementById('fallback');
  try {
    const response = await fetch('../../../assets/data/platform-guide-pdf-manifest.json', { cache: 'no-store' });
    if (!response.ok) throw new Error('metadata');
    const data = await response.json();
    const pdf = data?.ar;
    if (!pdf?.url) throw new Error('pdf');
    const root = '../../../';
    const version = encodeURIComponent(pdf.version || Date.now());
    const url = `${root}${pdf.url}?v=${version}`;
    const mode = new URLSearchParams(location.search).get('mode') || 'view';
    fallback.href = url;
    fallback.hidden = false;
    if (mode === 'download') {
      const link = document.createElement('a');
      link.href = url;
      link.download = pdf.downloadName || '';
      document.body.appendChild(link);
      link.click();
      setTimeout(() => location.replace(url), 1200);
    } else {
      location.replace(url);
    }
  } catch (error) {
    status.textContent = 'تعذر قراءة بيانات الإصدار. استخدم الرابط المباشر أدناه.';
    fallback.hidden = false;
    fallback.href = 'ConsuTrain_Profile_and_Services_AR.pdf';
  }
})();
</script>
</body>
</html>
