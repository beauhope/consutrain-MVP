name: Update platform guide PDFs

on:
  push:
    branches:
      - main
    paths:
      - "assets/data/platform-guide.json"
      - "assets/data/fr-platform-guide.json"
      - "assets/data/platform-contact.json"
      - "scripts/generate_platform_guide_pdfs.py"
      - "assets/images/consutrain-logo-horizontal.png"
      - "assets/images/consutrain-logo-horizontal-fr.png"
      - "assets/fonts/Cairo-Regular.ttf"
      - "assets/fonts/Cairo-Bold.ttf"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: platform-guide-pdfs
  cancel-in-progress: true

jobs:
  generate-pdfs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PDF generation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright "qrcode[pil]"
          python -m playwright install --with-deps chromium

      - name: Generate Arabic and French PDFs
        run: python scripts/generate_platform_guide_pdfs.py --root .

      - name: Verify generated files
        run: |
          test -s resources/downloads/profile/ConsuTrain_Profile_and_Services_AR.pdf
          test -s resources/downloads/profile/ConsuTrain_Profile_and_Services_FR.pdf
          test -s assets/data/platform-guide-pdf-manifest.json

      - name: Commit updated PDFs and manifest
        run: |
          FILES=(
            "resources/downloads/profile/ConsuTrain_Profile_and_Services_AR.pdf"
            "resources/downloads/profile/ConsuTrain_Profile_and_Services_FR.pdf"
            "assets/data/platform-guide-pdf-manifest.json"
          )

          if git diff --quiet -- "${FILES[@]}"; then
            echo "PDF files are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FILES[@]}"
          git commit -m "Update generated platform guide PDFs"
          git push
