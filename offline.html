<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ConsuTrain | غير متصل بالإنترنت</title>
  <meta name="theme-color" content="#0f2747">
  <style>
    :root{
      --navy:#0f2747;
      --gold:#c99930;
      --bg:#f7f9fc;
      --text:#3c5879;
      --card:#ffffff;
      --muted:#6b7e95;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family: Arial, "Segoe UI", Tahoma, sans-serif;
      background:linear-gradient(180deg,#eef3f9 0%, var(--bg) 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .wrap{
      width:min(760px,100%);
      background:var(--card);
      border-radius:24px;
      box-shadow:0 18px 50px rgba(15,39,71,.08);
      padding:36px 28px;
      text-align:center;
    }
    .badge{
      width:90px;height:90px;border-radius:24px;
      margin:0 auto 20px;
      background:linear-gradient(135deg,var(--navy),var(--gold));
      color:#fff7e8;
      display:flex;align-items:center;justify-content:center;
      font-size:44px;font-weight:700;
    }
    h1{
      margin:0 0 14px;
      color:var(--navy);
      font-size:clamp(28px,4vw,42px);
    }
    p{
      margin:0 auto 12px;
      max-width:580px;
      line-height:1.9;
      font-size:clamp(16px,2vw,21px);
    }
    .note{
      color:var(--muted);
      font-size:15px;
      margin-top:6px;
    }
    .actions{
      display:flex;
      gap:14px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:28px;
    }
    .btn{
      border:none;
      text-decoration:none;
      border-radius:16px;
      padding:14px 22px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      display:inline-block;
    }
    .btn-primary{background:var(--navy);color:#fff}
    .btn-secondary{background:#efe4cb;color:var(--navy)}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="badge">C</div>
    <h1>أنت الآن غير متصل بالإنترنت</h1>
    <p>
      يبدو أن الاتصال بالإنترنت غير متاح حاليًا.
      يمكنك إعادة المحاولة، أو الرجوع إلى الصفحة الرئيسية بعد عودة الاتصال.
    </p>
    <p class="note">بعض الصفحات التي زرتها سابقًا قد تبقى متاحة من خلال التخزين المؤقت.</p>
    <div class="actions">
      <button class="btn btn-primary" onclick="window.location.reload()">إعادة المحاولة</button>
      <a class="btn btn-secondary" href="./index.html">العودة إلى الرئيسية</a>
    </div>
  </main>
</body>
</html>
